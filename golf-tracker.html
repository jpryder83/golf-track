<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Scorecard</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  :root {
    --green-deep: #0d2b1a;
    --green-mid: #164d2e;
    --green-bright: #1a7a40;
    --green-accent: #22c55e;
    --gold: #d4a843;
    --cream: #e8f0eb;
    --muted: rgba(232,240,235,0.45);
    --card: rgba(255,255,255,0.06);
    --border: rgba(255,255,255,0.09);
    --danger: #ef4444;
    --birdie: #3b82f6;
    --eagle: #10b981;
    --bogey: #f97316;
    --double: #ef4444;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    min-height: 100vh;
    background: linear-gradient(160deg, var(--green-deep) 0%, #1a3d28 50%, #0d2b1a 100%);
    font-family: 'DM Sans', sans-serif;
    color: var(--cream);
    overscroll-behavior: none;
  }
  /* Grain overlay */
  body::before {
    content: '';
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    opacity: 0.6;
  }

  #app { position: relative; z-index: 1; max-width: 680px; margin: 0 auto; padding: 0 16px 60px; }

  /* Header */
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 0 16px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 28px;
  }
  .logo { font-family: 'Playfair Display', serif; font-size: 18px; letter-spacing: 0.08em; color: #b8ddc4; display: flex; align-items: center; gap: 10px; }
  .logo-icon { font-size: 20px; }
  .room-badge {
    font-size: 11px; letter-spacing: 0.12em; color: var(--gold);
    background: rgba(212,168,67,0.12); border: 1px solid rgba(212,168,67,0.25);
    padding: 4px 10px; border-radius: 20px; font-weight: 500;
  }

  /* Nav tabs */
  .nav { display: flex; gap: 6px; margin-bottom: 24px; }
  .nav-btn {
    flex: 1; padding: 9px 4px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--card); color: var(--muted); font-family: 'DM Sans', sans-serif;
    font-size: 12px; letter-spacing: 0.06em; cursor: pointer; transition: all 0.2s;
    text-transform: uppercase;
  }
  .nav-btn.active { background: rgba(34,197,94,0.15); border-color: rgba(34,197,94,0.35); color: #b8ddc4; }

  /* Cards */
  .card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 14px; padding: 18px; margin-bottom: 14px;
  }
  .section-label {
    font-size: 10px; letter-spacing: 0.14em; color: var(--muted);
    text-transform: uppercase; margin-bottom: 12px;
  }

  /* Inputs */
  input[type=text], input[type=number], select {
    background: rgba(0,0,0,0.3); border: 1px solid var(--border);
    border-radius: 8px; color: var(--cream); padding: 10px 12px;
    font-family: 'DM Sans', sans-serif; font-size: 14px;
    width: 100%; outline: none; transition: border-color 0.2s;
  }
  input:focus, select:focus { border-color: rgba(34,197,94,0.4); }
  input::placeholder { color: rgba(232,240,235,0.2); }
  select option { background: #1a3d28; }

  /* Buttons */
  .btn {
    width: 100%; padding: 13px; border-radius: 10px; border: none;
    font-family: 'DM Sans', sans-serif; font-size: 14px; letter-spacing: 0.06em;
    cursor: pointer; transition: all 0.2s; text-transform: uppercase; font-weight: 500;
  }
  .btn-primary { background: var(--green-accent); color: #fff; box-shadow: 0 4px 20px rgba(34,197,94,0.25); }
  .btn-primary:hover { background: #16a34a; }
  .btn-secondary { background: var(--card); border: 1px solid var(--border); color: var(--muted); }
  .btn-secondary:hover { color: var(--cream); border-color: rgba(255,255,255,0.2); }
  .btn-sm {
    padding: 5px 12px; font-size: 11px; border-radius: 6px; border: 1px solid var(--border);
    background: var(--card); color: var(--muted); cursor: pointer; font-family: 'DM Sans', sans-serif;
    letter-spacing: 0.05em; transition: all 0.15s;
  }
  .btn-sm:hover { color: var(--cream); }

  /* Player row */
  .player-row {
    display: flex; align-items: center; gap: 10px;
    background: rgba(0,0,0,0.2); border-radius: 8px; padding: 10px 12px;
    margin-bottom: 6px;
  }
  .player-name { flex: 1; font-size: 15px; }
  .player-hcp { font-size: 12px; color: var(--muted); }
  .remove-btn { background: none; border: none; color: rgba(255,100,100,0.4); cursor: pointer; font-size: 18px; line-height: 1; padding: 0 2px; }
  .remove-btn:hover { color: var(--danger); }

  /* Hole dots */
  .hole-dots { display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; margin-bottom: 20px; }
  .hole-dot {
    width: 30px; height: 30px; border-radius: 50%; border: none;
    font-size: 11px; cursor: pointer; font-family: 'DM Sans', sans-serif;
    transition: all 0.15s; color: var(--muted);
    background: rgba(255,255,255,0.07);
  }
  .hole-dot.current { background: var(--green-accent); color: #fff; font-weight: 600; }
  .hole-dot.complete { background: rgba(34,197,94,0.25); color: #b8ddc4; }
  .hole-dot.partial { background: rgba(34,197,94,0.1); }

  /* Score entry */
  .score-card {
    background: rgba(0,0,0,0.2); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px 16px; margin-bottom: 8px;
    display: flex; align-items: center; gap: 12px;
  }
  .score-card.has-score { border-color: rgba(34,197,94,0.2); }
  .score-info { flex: 1; }
  .score-player-name { font-size: 15px; margin-bottom: 2px; }
  .score-hcp-note { font-size: 11px; color: var(--muted); }
  .score-controls { display: flex; align-items: center; gap: 6px; }
  .score-badge {
    font-size: 10px; padding: 2px 8px; border-radius: 20px;
    letter-spacing: 0.04em; font-weight: 500;
  }
  .adj-btn {
    width: 34px; height: 40px; border-radius: 7px; border: 1px solid var(--border);
    background: rgba(255,255,255,0.07); color: var(--cream); font-size: 18px;
    cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s;
  }
  .adj-btn:hover { background: rgba(255,255,255,0.12); }
  .adj-btn:disabled { opacity: 0.25; cursor: default; }
  .score-input {
    width: 50px !important; height: 40px; text-align: center !important;
    font-size: 20px !important; padding: 0 !important;
    font-family: 'Playfair Display', serif !important;
    color: #b8ddc4 !important;
  }

  /* Hole nav */
  .hole-nav { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; }
  .hole-arrow {
    width: 42px; height: 42px; border-radius: 10px; border: 1px solid var(--border);
    background: var(--card); color: var(--cream); font-size: 18px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all 0.15s; flex-shrink: 0;
  }
  .hole-arrow:disabled { opacity: 0.25; cursor: default; }
  .hole-title { flex: 1; text-align: center; }
  .hole-num { font-family: 'Playfair Display', serif; font-size: 30px; color: #b8ddc4; }
  .hole-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }

  /* Leaderboard */
  .lb-row {
    display: flex; align-items: center; gap: 14px;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px 16px; margin-bottom: 8px;
    transition: all 0.2s;
  }
  .lb-row.first { background: rgba(34,197,94,0.1); border-color: rgba(34,197,94,0.25); }
  .lb-medal { font-size: 22px; width: 28px; text-align: center; flex-shrink: 0; }
  .lb-player { flex: 1; }
  .lb-name { font-size: 16px; margin-bottom: 2px; }
  .lb-detail { font-size: 11px; color: var(--muted); }
  .lb-score { text-align: right; }
  .lb-net { font-family: 'Playfair Display', serif; font-size: 24px; }
  .lb-gross { font-size: 11px; color: var(--muted); margin-top: 2px; }

  /* Scorecard table */
  .sc-table { width: 100%; border-collapse: collapse; font-size: 11px; }
  .sc-table th, .sc-table td { padding: 5px 3px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.04); }
  .sc-table th { color: var(--muted); font-weight: 400; }
  .sc-table .out-col, .sc-table .in-col, .sc-table .tot-col { color: var(--gold); }

  /* Toast */
  .toast {
    position: fixed; top: 70px; left: 50%; transform: translateX(-50%);
    padding: 10px 20px; border-radius: 8px; font-size: 13px; z-index: 9999;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4); transition: opacity 0.3s;
    white-space: nowrap;
  }
  .toast.success { background: #16a34a; color: #fff; }
  .toast.error { background: var(--danger); color: #fff; }

  /* Join screen */
  .join-screen { text-align: center; padding: 40px 0; }
  .join-title { font-family: 'Playfair Display', serif; font-size: 32px; color: #b8ddc4; margin-bottom: 8px; }
  .join-sub { color: var(--muted); font-size: 14px; margin-bottom: 36px; }
  .or-divider { display: flex; align-items: center; gap: 12px; margin: 20px 0; color: var(--muted); font-size: 12px; }
  .or-divider::before, .or-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .room-code-display {
    font-family: 'Playfair Display', serif; font-size: 42px; letter-spacing: 0.2em;
    color: var(--gold); text-align: center; padding: 16px;
    background: rgba(212,168,67,0.08); border: 1px solid rgba(212,168,67,0.2);
    border-radius: 12px; margin: 12px 0;
  }

  /* Connection indicator */
  .conn-dot {
    width: 7px; height: 7px; border-radius: 50%; display: inline-block; margin-right: 5px;
  }
  .conn-dot.online { background: var(--green-accent); box-shadow: 0 0 6px rgba(34,197,94,0.6); }
  .conn-dot.offline { background: #ef4444; }
  .conn-status { font-size: 11px; color: var(--muted); display: flex; align-items: center; }

  /* Sync pulse */
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .syncing { animation: pulse 1s infinite; }

  /* Running totals */
  .totals-row { display: flex; justify-content: space-between; font-size: 13px; padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
  .totals-row:last-child { border-bottom: none; }

  /* Hole edit */
  .hole-edit-row { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; font-size: 12px; }
  .hole-edit-num { width: 22px; text-align: right; color: var(--muted); flex-shrink: 0; }

  /* Firebase config screen */
  .config-screen { padding: 8px 0; }
  .config-field { margin-bottom: 12px; }
  .config-label { font-size: 11px; color: var(--muted); letter-spacing: 0.06em; margin-bottom: 5px; }

  .mt-8 { margin-top: 8px; }
  .mt-14 { margin-top: 14px; }
  .mt-20 { margin-top: 20px; }
  .gap-8 { gap: 8px; }
  .flex { display: flex; }
  .hidden { display: none; }

  /* Group / round list */
  .round-row {
    display: flex; align-items: center; gap: 12px;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 14px; margin-bottom: 8px;
    cursor: pointer; transition: border-color 0.15s;
  }
  .round-row:hover { border-color: rgba(255,255,255,0.18); }
  .round-row-left { text-align: center; min-width: 44px; flex-shrink: 0; }
  .round-row-day { font-size: 18px; font-family: 'Playfair Display', serif; color: #b8ddc4; line-height: 1; }
  .round-row-mon { font-size: 10px; color: var(--gold); letter-spacing: 0.08em; text-transform: uppercase; }
  .round-row-info { flex: 1; min-width: 0; }
  .round-row-course { font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .round-row-players { font-size: 11px; color: var(--muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .status-pip { font-size: 10px; letter-spacing: 0.06em; padding: 3px 8px; border-radius: 10px; white-space: nowrap; flex-shrink: 0; }
  .status-pip.setup    { background: rgba(255,255,255,0.06); color: var(--muted); border: 1px solid var(--border); }
  .status-pip.scoring  { background: rgba(34,197,94,0.12); color: var(--green-accent); border: 1px solid rgba(34,197,94,0.25); }
  .status-pip.complete { background: rgba(212,168,67,0.12); color: var(--gold); border: 1px solid rgba(212,168,67,0.25); }

  /* Player select pills (new-group-round) */
  .player-pill {
    display: inline-flex; align-items: center;
    padding: 8px 16px; border-radius: 20px; margin: 4px;
    font-size: 14px; background: var(--card); border: 1px solid var(--border);
    color: var(--muted); cursor: pointer; transition: all 0.15s;
    font-family: 'DM Sans', sans-serif; user-select: none;
  }
  .player-pill.selected { background: rgba(34,197,94,0.15); border-color: rgba(34,197,94,0.4); color: #b8ddc4; }
  .player-pill.locked   { cursor: default; }

  /* Group badge */
  .group-badge {
    font-size: 11px; letter-spacing: 0.12em; color: #b8ddc4;
    background: rgba(26,122,64,0.2); border: 1px solid rgba(34,197,94,0.25);
    padding: 4px 10px; border-radius: 20px; font-weight: 500;
  }

  /* Date input */
  input[type=date] {
    background: rgba(0,0,0,0.3); border: 1px solid var(--border);
    border-radius: 8px; color: var(--cream); padding: 10px 12px;
    font-family: 'DM Sans', sans-serif; font-size: 14px;
    width: 100%; outline: none; transition: border-color 0.2s;
    color-scheme: dark;
  }
  input[type=date]:focus { border-color: rgba(34,197,94,0.4); }

  /* Inline HCP edit in score cards */
  .hcp-inline {
    width: 38px !important; padding: 1px 4px !important; font-size: 11px !important;
    text-align: center !important; height: auto !important; display: inline-block !important;
    border-radius: 4px !important; vertical-align: middle;
  }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }
  .fade-in { animation: fadeIn 0.25s ease; }

  /* Competition / penalties */
  .pen-adj-btn {
    width: 26px; height: 26px; border-radius: 5px; border: 1px solid var(--border);
    background: rgba(255,255,255,0.07); color: var(--cream); font-size: 15px;
    cursor: pointer; display: inline-flex; align-items: center; justify-content: center;
    line-height: 1; padding: 0; font-family: 'DM Sans', sans-serif; transition: all 0.15s;
  }
  .pen-adj-btn:hover:not([disabled]) { background: rgba(255,255,255,0.14); }
  .pen-adj-btn[disabled] { opacity: 0.25; cursor: default; }
  .comp-winner-btn { margin: 3px; padding: 5px 12px; font-size: 12px; }
  .comp-winner-btn.selected { background: rgba(34,197,94,0.15); border-color: rgba(34,197,94,0.4); color: #b8ddc4; }
  .pink-active { color: #ec4899!important; border-color: rgba(236,72,153,0.4)!important; background: rgba(236,72,153,0.1)!important; }
</style>
</head>

// ── Helpers ──
function groupPath(code) { return `groups/${code}`; }
function todayDate() { return new Date().toISOString().slice(0,10); }
function formatDate(d) {
  if (!d) return '';
  const dt = new Date(d + 'T12:00:00');
  return dt.toLocaleDateString('en-GB', { weekday:'short', day:'numeric', month:'short' });
}

// ── Session persistence (localStorage) ──
function saveSession(roomCode, playerName, courseName) {
  const sessions = loadSessions().filter(s => s.roomCode !== roomCode);
  sessions.unshift({ roomCode, playerName, courseName: courseName || '', savedAt: Date.now() });
  localStorage.setItem('golf_sessions', JSON.stringify(sessions.slice(0, 5)));
}
function loadSessions() {
  try { return JSON.parse(localStorage.getItem('golf_sessions')) || []; } catch { return []; }
}
function forgetSession(roomCode) {
  const sessions = loadSessions().filter(s => s.roomCode !== roomCode);
  localStorage.setItem('golf_sessions', JSON.stringify(sessions));
}

// ── Group session persistence ──
function saveGroupSession(groupCode, playerName, groupName) {
  const sessions = loadGroupSessions().filter(s => s.groupCode !== groupCode);
  sessions.unshift({ groupCode, playerName, groupName: groupName || '', savedAt: Date.now() });
  localStorage.setItem('golf_group_sessions', JSON.stringify(sessions.slice(0, 3)));
}
function loadGroupSessions() {
  try { return JSON.parse(localStorage.getItem('golf_group_sessions')) || []; } catch { return []; }
}
function forgetGroupSession(groupCode) {
  const sessions = loadGroupSessions().filter(s => s.groupCode !== groupCode);
  localStorage.setItem('golf_group_sessions', JSON.stringify(sessions));
}

// ── Firebase init ──
function tryInitFirebase() {
  if (!FIREBASE_CONFIG.apiKey) return false;
  try {
    const app = initializeApp(FIREBASE_CONFIG);
    db = getDatabase(app);
    setConnected(true);
    return true;
  } catch(e) {
    console.error(e);
    return false;
  }
}

function setConnected(online) {
  document.getElementById('conn-dot').className = 'conn-dot ' + (online ? 'online' : 'offline');
  document.getElementById('conn-text').textContent = online ? 'Live' : 'Offline';
}

// ── Room code ──
function genCode() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  return Array.from({length:4}, ()=>chars[Math.floor(Math.random()*chars.length)]).join('');
}

function roomPath(code) { return `rounds/${code}`; }

// ── Toast ──
let toastTimer;
function toast(msg, type='success') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `toast ${type} fade-in`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>{ el.className='toast hidden'; }, 2800);
}

// ── Render dispatch ──
function render() {
  const root = document.getElementById('view-root');
  root.innerHTML = '';

  // Show room/group badge
  const badge = document.getElementById('room-badge');
  if (state.groupCode && (state.view === 'group-home' || state.view === 'new-group-round')) {
    badge.textContent = `GROUP ${state.groupCode}`;
    badge.className = 'group-badge';
    badge.classList.remove('hidden');
  } else if (state.roomCode && state.view !== 'join' && state.view !== 'config') {
    badge.textContent = `ROOM ${state.roomCode}`;
    badge.className = 'room-badge';
    badge.classList.remove('hidden');
  } else {
    badge.classList.add('hidden');
  }

  if (!FIREBASE_CONFIG.apiKey) {
    renderConfigScreen(root);
  } else if (state.view === 'join') {
    renderJoin(root);
  } else if (state.view === 'group-join-identity') {
    renderGroupJoinIdentity(root);
  } else if (state.view === 'group-home') {
    renderGroupHome(root);
  } else if (state.view === 'new-group-round') {
    renderNewGroupRound(root);
  } else if (state.view === 'setup') {
    renderSetup(root);
  } else if (state.view === 'scoring') {
    renderScoring(root);
  } else if (state.view === 'leaderboard') {
    renderLeaderboard(root);
  } else if (state.view === 'tournament-detail') {
    renderTournamentDetail(root);
  }
}

// ── Join round ──
async function joinRound(code, playerName) {
  try {
    const snap = await get(ref(db, roomPath(code)));
    if (!snap.exists()) { toast('Room not found. Check the code.', 'error'); return; }
    const data = snap.val();

    // Check if player already exists
    const existing = Object.values(data.players || {}).find(
      p => p.name.toLowerCase() === playerName.toLowerCase()
    );

    let playerId;
    if (existing) {
      playerId = existing.id;
      toast(`Welcome back, ${playerName}!`);
    } else {
      playerId = 'p_' + Date.now();
      await update(ref(db, `${roomPath(code)}/players`), {
        [playerId]: { name: playerName, handicap: 0, tee: 'yellow', id: playerId, joinedAt: Date.now() }
      });
      toast(`Joined round!`);
    }

    state.roomCode = code;
    state.playerName = playerName;
    state.round = data;
    state.view = data.status === 'scoring' ? 'scoring' : data.status === 'complete' ? 'leaderboard' : 'setup';
    subscribeToRound(code);
    updateURL(code);
    saveSession(code, playerName, data.courseName);
    render();
  } catch(e) {
    toast('Failed to join. Check your connection.', 'error');
    console.error(e);
  }
}

// ── Subscribe ──
function subscribeToRound(code) {
  if (unsubscribe) { off(ref(db, roomPath(code))); }
  const r = ref(db, roomPath(code));
  let prevStatus = null;
  onValue(r, (snap) => {
    if (!snap.exists()) return;
    const newData = snap.val();
    const statusChanged = prevStatus !== newData.status;
    prevStatus = newData.status;
    state.round = newData;
    if (state.round.status === 'scoring' && state.view === 'setup') state.view = 'scoring';
    if (state.round.status === 'complete' && statusChanged) state.view = 'leaderboard';
    render();
  });
  unsubscribe = () => off(r);
}

async function deleteRound(roundCode, groupCode) {
  if (!confirm('Delete this round? All scores will be lost and cannot be recovered.')) return;
  try {
    if (groupCode) await set(ref(db, `${groupPath(groupCode)}/rounds/${roundCode}`), null);
    await set(ref(db, roomPath(roundCode)), null);
    forgetSession(roundCode);
    if (state.roomCode === roundCode) goBackFromRound();
    else toast('Round deleted');
  } catch(e) {
    toast('Failed to delete — check Firebase rules allow deletion.', 'error');
    console.error(e);
  }
}

function goBackFromRound() {
  if (unsubscribe) unsubscribe();
  const url = new URL(window.location);
  url.searchParams.delete('room');
  window.history.replaceState({}, '', url);
  state.roomCode = null; state.playerName = null; state.round = null;
  state.currentHole = 1; state.editingHoles = false;
  state.view = state.tournamentId ? 'tournament-detail' : (state.groupCode ? 'group-home' : 'join');
  render();
}

function updateURL(code) {
  const url = new URL(window.location);
  url.searchParams.set('room', code);
  window.history.replaceState({}, '', url);
}

// ── Group functions ──
async function createGroup(groupName, playerName) {
  const code = genCode();
  const memberId = 'p_' + Date.now();
  const groupData = {
    name: groupName,
    createdAt: Date.now(),
    members: { [memberId]: { name: playerName, handicap: 0, tee: 'yellow', id: memberId, joinedAt: Date.now() } },
    rounds: {}
  };
  try {
    await set(ref(db, groupPath(code)), groupData);
    state.groupCode = code;
    state.group = groupData;
    state.groupPlayerName = playerName;
    state.view = 'group-home';
    subscribeToGroup(code);
    saveGroupSession(code, playerName, groupName);
    toast(`Group created! Code: ${code}`);
    render();
  } catch(e) { toast('Failed to create group.', 'error'); console.error(e); }
}

async function joinGroup(code, playerName) {
  try {
    const snap = await get(ref(db, groupPath(code)));
    if (!snap.exists()) { toast('Group not found. Check the code.', 'error'); return; }
    const data = snap.val();
    const existing = Object.values(data.members || {}).find(m => m.name.toLowerCase() === playerName.toLowerCase());
    if (!existing) {
      const memberId = 'p_' + Date.now();
      await update(ref(db, `${groupPath(code)}/members`), {
        [memberId]: { name: playerName, handicap: 0, tee: 'yellow', id: memberId, joinedAt: Date.now() }
      });
      toast(`Joined group: ${data.name}!`);
    } else {
      toast(`Welcome back, ${playerName}!`);
    }
    state.groupCode = code;
    state.group = data;
    state.groupPlayerName = playerName;
    state.view = 'group-home';
    state.pendingGroupCode = null;
    state.pendingGroup = null;
    subscribeToGroup(code);
    saveGroupSession(code, playerName, data.name);
    render();
  } catch(e) { toast('Failed to join group.', 'error'); console.error(e); }
}

function subscribeToGroup(code) {
  if (groupUnsubscribe) groupUnsubscribe();
  const r = ref(db, groupPath(code));
  onValue(r, (snap) => {
    if (!snap.exists()) return;
    state.group = snap.val();
    if (state.view === 'group-home') render();
  });
  groupUnsubscribe = () => off(r);
}

async function updateGroupRoundStatus(roundCode, status) {
  if (!state.groupCode) return;
  await update(ref(db, `${groupPath(state.groupCode)}/rounds/${roundCode}`), { status });
}

async function loadSuggestedHandicaps(group, members) {
  const result = new Map();
  const allGroupRounds = Object.entries(group.rounds || {})
    .map(([code, r]) => ({ code, ...r }))
    .filter(r => r.status === 'complete')
    .sort((a, b) => (b.date || '').localeCompare(a.date || '') || b.createdAt - a.createdAt)
    .slice(0, 20);
  if (allGroupRounds.length === 0) return result;

  const fullRounds = await Promise.all(
    allGroupRounds.map(r =>
      get(ref(db, roomPath(r.code)))
        .then(snap => snap.exists() ? snap.val() : null)
        .catch(() => null)
    )
  );

  for (const member of members) {
    const memberNameLower = member.name.toLowerCase();
    const allDiffs = []; // { diff, date }
    const nineHoleRecords = []; // { hcpScore, cr9, slope9, date }

    for (const round of fullRounds) {
      if (!round) continue;
      const holes = round.holes || [];
      const numHoles = holes.length;
      if (numHoles !== 18 && numHoles !== 9) continue;
      const player = Object.values(round.players || {}).find(p => p.name.toLowerCase() === memberNameLower);
      if (!player) continue;
      const playerScores = (round.scores || {})[player.id] || {};
      if (holes.filter(h => playerScores[h.hole] != null).length !== numHoles) continue;
      const tee = player.tee || 'yellow';
      let hcpScore = 0;
      for (const h of holes) {
        hcpScore += calcHandicapScore(playerScores[h.hole], effectivePar(h, tee), player.handicap, effectiveSI(h, tee), numHoles);
      }
      const { cr, slope } = getPlayerCRSlope(player, round);
      if (numHoles === 18) {
        const diff = calcDifferential(hcpScore, cr, slope);
        if (diff !== null) allDiffs.push({ diff, date: round.date || '' });
      } else {
        if (cr !== null && slope != null) nineHoleRecords.push({ hcpScore, cr9: cr, slope9: slope, date: round.date || '' });
      }
    }

    // Pair 9-hole records chronologically (oldest first) — WHS combines consecutive pairs
    const sortedNine = [...nineHoleRecords].sort((a, b) => a.date.localeCompare(b.date));
    for (let i = 0; i + 1 < sortedNine.length; i += 2) {
      const a = sortedNine[i], b = sortedNine[i + 1];
      const diff = calcDifferential(a.hcpScore + b.hcpScore, a.cr9 + b.cr9, (a.slope9 + b.slope9) / 2);
      if (diff !== null) allDiffs.push({ diff, date: b.date });
    }

    const diffs = allDiffs.sort((a, b) => b.date.localeCompare(a.date)).slice(0, 20).map(d => d.diff);
    result.set(member.id, calcSuggestedHandicap(diffs));
  }
  return result;
}

async function createGroupRound(courseName, holes, courseKey, date, selectedMembers, courseRating = null, slopeRating = null) {
  const code = genCode();
  const playersObj = {};
  selectedMembers.forEach(m => {
    const pid = 'p_' + Date.now() + Math.random().toString(36).slice(2,6);
    playersObj[pid] = { name: m.name, handicap: m.handicap || 0, tee: m.tee || 'yellow', id: pid, joinedAt: Date.now() };
  });
  const roundData = {
    courseName, courseKey: courseKey || null, courseRating, slopeRating, date, groupCode: state.groupCode,
    createdAt: Date.now(), createdBy: state.groupPlayerName, status: 'setup', holes, players: playersObj, scores: {}
  };
  try {
    await set(ref(db, roomPath(code)), roundData);
    const playerNames = selectedMembers.map(m => m.name).join(', ');
    await update(ref(db, `${groupPath(state.groupCode)}/rounds`), {
      [code]: { courseName, date, createdAt: Date.now(), status: 'setup', playerNames }
    });
    if (state.tournamentId) {
      await update(ref(db, `${groupPath(state.groupCode)}/tournaments/${state.tournamentId}/rounds`), { [code]: true });
    }
    // Also update group member handicaps/tees from the selection
    const members = Object.values(state.group.members || {});
    for (const m of selectedMembers) {
      const gm = members.find(x => x.name.toLowerCase() === m.name.toLowerCase());
      if (gm) await update(ref(db, `${groupPath(state.groupCode)}/members/${gm.id}`), { handicap: m.handicap || gm.handicap, tee: m.tee || gm.tee });
    }
    state.roomCode = code;
    state.playerName = state.groupPlayerName;
    state.round = roundData;
    state.view = 'setup';
    subscribeToRound(code);
    updateURL(code);
    toast('Round created!');
    render();
  } catch(e) { toast('Failed to create round.', 'error'); console.error(e); }
}

        style="width:42px;padding:3px 4px;font-size:12px;text-align:center;">

}

function bindHoleEditorEvents(holes) {
  holes.forEach((h, i) => {
    const parEl = document.getElementById(`par-${i}`);
    const siEl = document.getElementById(`si-${i}`);
    if (parEl) parEl.onchange = () => updateHole(i, 'par', parseInt(parEl.value));
    if (siEl) siEl.onchange = () => updateHole(i, 'si', parseInt(siEl.value));
  });
}

async function updateHole(idx, field, val) {
  const holes = [...(state.round.holes || DEFAULT_HOLES)];
  holes[idx] = { ...holes[idx], [field]: val };
  await update(ref(db, roomPath(state.roomCode)), { holes });
}

async function startRound() {
  await update(ref(db, roomPath(state.roomCode)), { status: 'scoring' });
  updateGroupRoundStatus(state.roomCode, 'scoring');
  state.view = 'scoring';
  state.currentHole = 1;
  render();
}

async function autoSplitGroups(size) {
  const players = Object.values(state.round.players || {})
    .sort((a, b) => (a.joinedAt || 0) - (b.joinedAt || 0));
  const assignments = {};
  players.forEach((p, i) => { assignments[p.id] = Math.floor(i / size) + 1; });
  await update(ref(db, `${roomPath(state.roomCode)}/playerGroups`), assignments);
}

// ── Scoring view ──
function getPlayingGroups(players, playerGroups) {
  const grouped = {};
  for (const p of players) {
    const gNum = (playerGroups || {})[p.id] || 1;
    if (!grouped[gNum]) grouped[gNum] = [];
    grouped[gNum].push(p);
  }
  return Object.entries(grouped)
    .sort(([a],[b]) => parseInt(a) - parseInt(b))
    .map(([gNum, ps]) => ({ num: parseInt(gNum), players: ps }));
}

function renderScoring(root) {
  const round = state.round;
  const players = Object.values(round.players || {});
  const holes = round.holes || DEFAULT_HOLES;
  const scores = round.scores || {};
  const hole = holes[state.currentHole - 1];
  const totalPar = holes.reduce((a,h)=>a+h.par,0);
  const playerGroups = round.playerGroups || {};
  const playingGroups = getPlayingGroups(players, playerGroups);
  const hasMultipleGroups = playingGroups.length > 1;

  // Dot status
  const dotClass = (h) => {
    const all = players.every(p => (scores[p.id]||{})[h.hole] != null);
    const some = players.some(p => (scores[p.id]||{})[h.hole] != null);
    if (h.hole === state.currentHole) return 'hole-dot current';
    if (all) return 'hole-dot complete';
    if (some) return 'hole-dot partial';
    return 'hole-dot';
  };

  // Totals
  const totals = players.map(p => {
    const tee = p.tee || 'yellow';
    let gross=0, net=0, hcpScore=0, played=0;
    holes.forEach(h => {
      const s = (scores[p.id]||{})[h.hole];
      if (s != null) { gross+=s; net+=(s - effectivePar(h,tee) - calcExtraStroke(p.handicap, effectiveSI(h,tee), holes.length)); hcpScore+=calcHandicapScore(s, effectivePar(h,tee), p.handicap, effectiveSI(h,tee), holes.length); played++; }
    });
    return { ...p, gross, net, hcpScore, played };
  }).sort((a,b)=>a.net-b.net);

  root.innerHTML = `
    <div class="fade-in">
      <div class="nav">
        <button class="nav-btn" id="nav-back">← ${state.tournamentId ? 'Tournament' : (state.groupCode ? 'Group' : 'Home')}</button>

        <button class="nav-btn" id="nav-lb">Leaderboard</button>
      </div>

      <div class="hole-nav">
        <button class="hole-arrow" id="prev-hole" ${state.currentHole===1?'disabled':''}>←</button>
        <div class="hole-title">
          <div class="hole-num">Hole ${state.currentHole}</div>
          <div class="hole-meta">Par ${hole.par} &nbsp;·&nbsp; SI ${hole.si}</div>
        </div>
        <button class="hole-arrow" id="next-hole" ${state.currentHole===18?'disabled':''}>→</button>
      </div>

      <div class="hole-dots">
        ${holes.map(h => `<button class="hole-dot ${dotClass(h).replace('hole-dot ','').replace('hole-dot','').trim()}" 
          id="dot-${h.hole}" onclick="window._goHole(${h.hole})">${h.hole}</button>`).join('')}
      </div>

      <div id="score-entries">
        ${hasMultipleGroups
          ? playingGroups.map(g => `
              <div style="font-size:10px;letter-spacing:0.12em;color:var(--muted);padding:8px 2px 4px;${g.num > 1 ? 'margin-top:4px;' : ''}">
                GROUP ${g.num} &nbsp;·&nbsp; ${g.players.map(p=>p.name).join(', ')}
              </div>
              ${g.players.map(p => renderScoreEntry(p, hole, scores, holes.length)).join('')}
            `).join('<div style="border-top:1px solid var(--border);margin:6px 0;"></div>')
          : players.map(p => renderScoreEntry(p, hole, scores, holes.length)).join('')
        }
      </div>

      ${renderCompetitionSection(players, hole, round)}

      <div class="card mt-14">
        <div class="section-label">Running Totals</div>
        ${totals.map(p => {
          const gNum = playerGroups[p.id] || 1;
          return `
          <div class="totals-row">
            <span>
              ${hasMultipleGroups ? `<span style="font-size:10px;color:var(--muted);margin-right:4px;">G${gNum}</span>` : ''}
              ${p.name} ${p.name===state.playerName?'<span style="font-size:10px;color:var(--green-accent);">(you)</span>':''}
            </span>
            <span style="color:var(--muted);">
              ${p.played > 0 ? `${p.gross} gross · <span style="color:${p.net<0?'#10b981':p.net===0?'var(--cream)':'#f97316'}">${p.net>=0?'+'+p.net:p.net}</span> net · <span style="color:var(--gold);">${p.hcpScore} hcp</span>` : '—'}
            </span>
          </div>`;
        }).join('')}
      </div>

      <button class="btn btn-secondary mt-14" id="finish-btn">View Final Leaderboard →</button>
    </div>
  `;

  // Bind holes dots properly
  holes.forEach(h => {
    const dot = document.getElementById(`dot-${h.hole}`);
    if (dot) {
      dot.className = dotClass(h);
      dot.onclick = () => { state.currentHole = h.hole; render(); };
    }
  });

  document.getElementById('prev-hole').onclick = () => { if(state.currentHole>1){state.currentHole--;render();} };
  document.getElementById('next-hole').onclick = () => { if(state.currentHole<18){state.currentHole++;render();} };
  document.getElementById('nav-back').onclick = () => goBackFromRound();
  document.getElementById('nav-lb').onclick = () => { state.view='leaderboard'; render(); };
  document.getElementById('finish-btn').onclick = async () => {
    await update(ref(db, roomPath(state.roomCode)), { status: 'complete' });
    updateGroupRoundStatus(state.roomCode, 'complete');
    state.view = 'leaderboard'; render();
  };

  window._goHole = (n) => { state.currentHole=n; render(); };
  bindScoreEntries(players, hole, scores);
  bindCompetitionSection(players, hole, round);
}

function calcExtraStroke(handicap, si, numHoles = 18) {
  const h = Math.round(numHoles === 9 ? handicap / 2 : handicap);
  const n = numHoles === 9 ? 9 : 18;
  return Math.floor(h / n) + (h % n >= si ? 1 : 0);
}

function calcHandicapScore(gross, par, handicap, si, numHoles = 18) {
  const max = par + 2 + calcExtraStroke(handicap, si, numHoles);
  return Math.min(gross, max);
}

function effectivePar(hole, tee) {
  if (tee === 'red' && hole.parRed != null) return hole.parRed;
  return hole.par;
}

function effectiveSI(hole, tee) {
  if (tee === 'red' && hole.siRed != null) return hole.siRed;
  return hole.si;
}

function calcDifferential(hcpScore, cr, slope) {
  if (cr == null || slope == null || !slope) return null;
  return Math.round((hcpScore - cr) * 113 / slope * 10) / 10;
}

function getPlayerCRSlope(player, round) {
  const courseKey = round.courseKey;
  if (courseKey && COURSES[courseKey]) {
    const c = COURSES[courseKey];
    const tee = player.tee || 'yellow';
    return { cr: c.cr?.[tee] ?? null, slope: c.slope?.[tee] ?? null };
  }
  return { cr: round.courseRating ?? null, slope: round.slopeRating ?? null };
}

function calcCompetitionBreakdown(playerId, round) {
  const competition = round.competition || {};
  const scores = round.scores?.[playerId] || {};
  let gained = 0, lost = 0;

  for (const score of Object.values(scores)) {
    if (score === 2) gained += 5;
  }
  for (const holeComp of Object.values(competition.holes || {})) {
    if (holeComp.longestDrive === playerId) gained += 3;
    if (holeComp.nearestPin === playerId) gained += 2;
    if (holeComp.nearestPinInTwo === playerId) gained += 2;
  }

  // Pink ball: always per-group; unassigned players default to group 1
  const pinkGroupNum = (round.playerGroups || {})[playerId] || 1;
  if (competition.pinkBall?.groups?.[`g${pinkGroupNum}`]?.returned) gained += 2;

  const pen = competition.penalties?.[playerId] || {};
  for (const { key } of PENALTY_TYPES) {
    lost += (pen[key] || 0);
  }
  const lostBalls = pen.lostBalls || 0;
  if (lostBalls >= 6) lost += 4;
  else if (lostBalls >= 3) lost += 2;
  lost += (pen.notShoutingFore || 0) * 2;

  return { gained, lost, net: gained - lost };
}

function calcCompetitionPoints(playerId, round) {
  return calcCompetitionBreakdown(playerId, round).net;
}

function calcSuggestedHandicap(differentials) {
  const recent = differentials.slice(0, 20);
  const n = recent.length;
  if (n === 0) return null;
  // [minRounds, useCount, adjustment] — WHS table extended to 1-2 rounds
  const table = [
    [1, 1, -2.0], [2, 1, -1.0], [3, 1, -2.0], [4, 1, -1.0],
    [5, 1,  0  ], [6, 2, -1.0], [7, 2,  0  ], [9, 3,  0  ],
    [12, 4, 0  ], [15, 5, 0  ], [17, 6, 0  ], [19, 7, 0  ], [20, 8, 0]
  ];
  let useCount = 1, adjustment = -2.0;
  for (const [min, count, adj] of table) {
    if (n >= min) { useCount = count; adjustment = adj; }
  }
  const sorted = [...recent].sort((a, b) => a - b);
  const best = sorted.slice(0, useCount);
  const avg = best.reduce((s, d) => s + d, 0) / best.length;
  return Math.round((avg * 0.96 + adjustment) * 10) / 10;
}

function scoreLabel(diff) {
  if (diff <= -3) return { label:'Albatross', color:'var(--gold)' };
  if (diff === -2) return { label:'Eagle', color:'var(--eagle)' };
  if (diff === -1) return { label:'Birdie', color:'var(--birdie)' };
  if (diff === 0)  return { label:'Par', color:'var(--muted)' };
  if (diff === 1)  return { label:'Bogey', color:'var(--bogey)' };
  if (diff === 2)  return { label:'Double', color:'var(--double)' };
  return { label:`+${diff}`, color:'var(--double)' };
}

function renderScoreEntry(player, hole, scores, numHoles = 18) {
  const s = (scores[player.id]||{})[hole.hole];
  const tee = player.tee || 'yellow';
  const ePar = effectivePar(hole, tee);
  const extraStroke = calcExtraStroke(player.handicap, effectiveSI(hole, tee), numHoles);
  const diff = s != null ? (s - ePar) : null;
  const lbl = diff != null ? scoreLabel(diff) : null;
  const teeData = TEE_INFO[tee];
  const rawYards = hole.yards;
  const yards = rawYards && typeof rawYards === 'object' ? rawYards[tee] : rawYards;
  return `
    <div class="score-card ${s!=null?'has-score':''}" id="sc-${player.id}">
      <div class="score-info">
        <div class="score-player-name">${player.name}${extraStroke?` <span style="color:var(--gold);font-size:11px;">●</span>`:''}
          ${player.name===state.playerName?'<span style="font-size:10px;color:var(--green-accent);margin-left:4px;">(you)</span>':''}
        </div>
        <div class="score-hcp-note">
          HCP <input type="number" class="hcp-inline" id="hcp-inline-${player.id}"
            value="${player.handicap}" min="0" max="54" step="0.1">
          ${teeData ? ` &nbsp;·&nbsp; <span style="color:${teeData.color};">■</span> ${teeData.label}` : ''}
          ${yards ? ` · ${yards}y` : ''}
          ${extraStroke ? ' · extra stroke' : ''}
        </div>
      </div>
      <div class="score-controls">
        ${lbl ? `<span class="score-badge" style="color:${lbl.color};background:${lbl.color}22;">${lbl.label}</span>` : ''}
        <button class="adj-btn" id="dec-${player.id}" ${(s!=null&&s<=1)?'disabled':''}>−</button>
        <input type="number" class="score-input" id="inp-${player.id}"
          value="${s??''}" placeholder="${ePar}" min="1" max="15">
        <button class="adj-btn" id="inc-${player.id}">+</button>
      </div>
    </div>
  `;
}

function bindScoreEntries(players, hole, scores) {
  players.forEach(player => {
    const s = (scores[player.id]||{})[hole.hole];
    const inp = document.getElementById(`inp-${player.id}`);
    const dec = document.getElementById(`dec-${player.id}`);
    const inc = document.getElementById(`inc-${player.id}`);
    if (!inp) return;

    const setScore = async (val) => {
      const n = parseInt(val);
      if (!val || isNaN(n) || n<1 || n>15) return;
      await update(ref(db, `${roomPath(state.roomCode)}/scores/${player.id}`), { [hole.hole]: n });
    };

    inp.oninput = (e) => setScore(e.target.value);
    if (dec) dec.onclick = () => { const cur = parseInt(inp.value); setScore(isNaN(cur) ? hole.par - 1 : cur - 1); };
    if (inc) inc.onclick = () => { const cur = parseInt(inp.value); setScore(isNaN(cur) ? hole.par : cur + 1); };

    const hcpInp = document.getElementById(`hcp-inline-${player.id}`);
    if (hcpInp) {
      hcpInp.onchange = async (e) => {
        const n = parseFloat(e.target.value);
        if (isNaN(n) || n < 0 || n > 54) return;
        await update(ref(db, `${roomPath(state.roomCode)}/players/${player.id}`), { handicap: n });
      };
    }
  });
}

function renderPenaltiesPanel(players, competition) {
  const allTypes = [...PENALTY_TYPES,
    { key: 'lostBalls',       label: 'Lost balls (count, escalating −2/−4)' },
    { key: 'notShoutingFore', label: 'Not shouting fore (−2 each)' },
  ];
  const selId = state.penaltiesSelectedPlayer;
  const selPlayer = players.find(p => p.id === selId) || null;

  const playerPills = `
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;">
      ${players.map(p => {
        const pen = competition.penalties?.[p.id] || {};
        const total = allTypes.reduce((s, { key }) => s + (pen[key] || 0), 0);
        const isSelected = p.id === selId;
        return `
          <button class="pen-player-btn player-pill ${isSelected ? 'selected' : ''}" data-pid="${p.id}"
            style="${isSelected ? '' : total > 0 ? 'border-color:rgba(239,68,68,0.5);' : ''}">
            ${p.name}${total > 0 ? ` <span style="color:var(--danger);font-size:10px;">(${total})</span>` : ''}
          </button>
        `;
      }).join('')}
    </div>
  `;

  if (!selPlayer) {
    return playerPills + `<div style="font-size:12px;color:var(--muted);text-align:center;padding:8px 0;">Select a player above to record penalties</div>`;
  }

  const pen = competition.penalties?.[selPlayer.id] || {};
  const penaltyRows = allTypes.map(({ key, label }) => {
    const count = pen[key] || 0;
    return `
      <div style="display:flex;align-items:center;justify-content:space-between;padding:4px 8px;background:rgba(0,0,0,0.15);border-radius:6px;margin-bottom:2px;">
        <span style="font-size:11px;color:${count > 0 ? 'var(--cream)' : 'var(--muted)'};">${label}</span>
        <div style="display:flex;align-items:center;gap:5px;flex-shrink:0;margin-left:8px;">
          <button class="pen-adj-btn" data-pid="${selPlayer.id}" data-key="${key}" data-delta="-1" ${count === 0 ? 'disabled' : ''}>−</button>
          <span style="width:16px;text-align:center;font-size:12px;${count > 0 ? 'color:var(--danger);font-weight:700;' : 'color:var(--muted);'}">${count}</span>
          <button class="pen-adj-btn" data-pid="${selPlayer.id}" data-key="${key}" data-delta="1">+</button>
        </div>
      </div>
    `;
  }).join('');

  return playerPills + penaltyRows;
}

function bindCompetitionSection(players, hole, round) {
  const competition = round.competition || {};
  const isLDHole = competition.longestDriveHole === hole.hole;
  const isNTP2Hole = competition.nearestPinInTwoHole === hole.hole;

  const ldBtn = document.getElementById('ld-hole-btn');
  if (ldBtn) {
    ldBtn.onclick = async () => {
      const newVal = isLDHole ? null : hole.hole;
      await update(ref(db, `${roomPath(state.roomCode)}/competition`), { longestDriveHole: newVal });
    };
  }

  const ntp2Btn = document.getElementById('ntp2-hole-btn');
  if (ntp2Btn) {
    ntp2Btn.onclick = async () => {
      const newVal = isNTP2Hole ? null : hole.hole;
      await update(ref(db, `${roomPath(state.roomCode)}/competition`), { nearestPinInTwoHole: newVal });
    };
  }

  document.querySelectorAll('.comp-winner-btn').forEach(btn => {
    btn.onclick = async () => {
      const { field, hole: holeNum, pid } = btn.dataset;
      await update(ref(db, `${roomPath(state.roomCode)}/competition/holes/${holeNum}`), { [field]: pid || null });
    };
  });

  document.querySelectorAll('.comp-distance-input').forEach(inp => {
    inp.onchange = async () => {
      const { distfield, hole: holeNum } = inp.dataset;
      const val = inp.value.trim() || null;
      await update(ref(db, `${roomPath(state.roomCode)}/competition/holes/${holeNum}`), { [distfield]: val });
    };
    inp.onkeydown = (e) => { if (e.key === 'Enter') inp.blur(); };
  });

  const toggleBtn = document.getElementById('toggle-penalties-btn');
  if (toggleBtn) {
    toggleBtn.onclick = () => {
      state.penaltiesPanelOpen = !state.penaltiesPanelOpen;

      const arrow = document.getElementById('pen-arrow');
      if (panel) panel.style.display = state.penaltiesPanelOpen ? 'block' : 'none';
      if (arrow) arrow.textContent = state.penaltiesPanelOpen ? '▴' : '▾';
    };
  }

  bindPenaltiesPanel(players, round);
}

function bindPenaltiesPanel(players, round) {
  document.querySelectorAll('.pen-player-btn').forEach(btn => {
    btn.onclick = () => {
      const pid = btn.dataset.pid;
      state.penaltiesSelectedPlayer = state.penaltiesSelectedPlayer === pid ? null : pid;
      const panel = document.getElementById('penalties-panel');

  });
}

// ── Leaderboard ──
function renderLeaderboard(root) {
  const round = state.round;
  const players = Object.values(round.players || {});
  const holes = round.holes || DEFAULT_HOLES;
  const scores = round.scores || {};
  const totalPar = holes.reduce((a,h)=>a+h.par,0);

  const lb = players.map(p => {
    const tee = p.tee || 'yellow';
    let gross=0, net=0, hcpScore=0, played=0, frontGross=0, backGross=0, stableford=0, frontSF=0, backSF=0;
    holes.forEach((h,i) => {
      const s = (scores[p.id]||{})[h.hole];
      if (s != null) {
        played++;
        gross+=s;
        net+=(s - effectivePar(h,tee) - calcExtraStroke(p.handicap, effectiveSI(h,tee), holes.length));
        hcpScore+=calcHandicapScore(s, effectivePar(h,tee), p.handicap, effectiveSI(h,tee), holes.length);
        const pts = Math.max(0, 2 - (s - effectivePar(h,tee) - calcExtraStroke(p.handicap, effectiveSI(h,tee), holes.length)));
        stableford+=pts;
        if(i<9) { frontGross+=s; frontSF+=pts; } else { backGross+=s; backSF+=pts; }
      }
    });
    const { cr, slope } = getPlayerCRSlope(p, round);
    const differential = played === holes.length ? calcDifferential(hcpScore, cr, slope) : null;
    const compPts = calcCompetitionPoints(p.id, round);
    return { ...p, gross, net, hcpScore, differential, played, frontGross, backGross, stableford, frontSF, backSF, compPts };
  }).sort((a,b)=>b.stableford-a.stableford);

  const medals = ['🥇','🥈','🥉'];

  root.innerHTML = `
    <div class="fade-in">

          ${round.courseName || 'Round Results'}
