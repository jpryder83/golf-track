        <div style="font-size:12px;color:var(--muted);margin-top:4px;">Par ${totalPar}</div>
      </div>

      ${lb.map((p,i) => `
        <div class="lb-row ${i===0?'first':''}">
          <div class="lb-medal">${medals[i]||i+1}</div>
          <div class="lb-player">
            <div class="lb-name">${p.name}${p.name===state.playerName?' <span style="font-size:11px;color:var(--green-accent);">(you)</span>':''}</div>
            <div class="lb-detail">HCP <input type="number" class="hcp-inline" id="lb-hcp-${p.id}" value="${p.handicap}" min="0" max="54" step="0.1"> · ${p.played} holes</div>
          </div>
          <div class="lb-score">
            <div class="lb-net" style="color:var(--green-accent);">
              ${p.stableford} pts
              ${p.compPts !== 0 ? `<span style="font-size:13px;color:${p.compPts > 0 ? 'var(--gold)' : 'var(--danger)'};">&nbsp;${p.compPts >= 0 ? '+' : ''}${p.compPts} comp</span>` : ''}
            </div>
            <div class="lb-gross">${p.gross} gross · ${p.net>=0?'+'+p.net:p.net} net · <span style="color:var(--gold);">${p.hcpScore} hcp</span>${p.differential!=null?` · <span style="color:var(--muted);">diff ${p.differential>=0?'+':''}${p.differential}</span>`:''}</div>
          </div>
        </div>
      `).join('')}

      <div class="card mt-20">
        <div class="section-label">Full Scorecard</div>
        <div style="overflow-x:auto;">
          <table class="sc-table">
            <thead>
              <tr>
                <th style="text-align:left;">Player</th>
                ${holes.slice(0,9).map(h=>`<th>${h.hole}</th>`).join('')}
                <th class="out-col">OUT</th>
                ${holes.slice(9).map(h=>`<th>${h.hole}</th>`).join('')}
                <th class="in-col">IN</th>
                <th class="tot-col">TOT</th>
              </tr>
              <tr>
                <th style="text-align:left;color:var(--muted);">Par</th>
                ${holes.slice(0,9).map(h=>`<td>${h.par}</td>`).join('')}
                <td class="out-col">${holes.slice(0,9).reduce((a,h)=>a+h.par,0)}</td>
                ${holes.slice(9).map(h=>`<td>${h.par}</td>`).join('')}
                <td class="in-col">${holes.slice(9).reduce((a,h)=>a+h.par,0)}</td>
                <td class="tot-col">${totalPar}</td>
              </tr>
            </thead>
            <tbody>
              ${lb.map(p => {
                const ps = scores[p.id]||{};
                return `
                  <tr>
                    <td style="text-align:left;white-space:nowrap;">${p.name}</td>
                    ${holes.slice(0,9).map(h => {
                      const s = ps[h.hole];
                      const diff = s!=null ? s-h.par : null;
                      const col = diff!=null ? scoreLabel(diff).color : 'var(--muted)';
                      return `<td style="color:${col}">${s??'—'}</td>`;
                    }).join('')}
                    <td class="out-col">${p.frontGross||'—'}</td>
                    ${holes.slice(9).map(h => {
                      const s = ps[h.hole];
                      const diff = s!=null ? s-h.par : null;
                      const col = diff!=null ? scoreLabel(diff).color : 'var(--muted)';
                      return `<td style="color:${col}">${s??'—'}</td>`;
                    }).join('')}
                    <td class="in-col">${p.backGross||'—'}</td>
                    <td class="tot-col">${p.gross||'—'}</td>
                  </tr>
                  <tr style="font-size:11px;opacity:0.65;">
                    <td style="text-align:left;white-space:nowrap;color:var(--green-accent);">Stableford</td>
                    ${holes.slice(0,9).map(h => {
                      const s = ps[h.hole];
                      const pts = s!=null ? Math.max(0, 2-(s-effectivePar(h,p.tee||'yellow')-calcExtraStroke(p.handicap,effectiveSI(h,p.tee||'yellow'),holes.length))) : null;
                      return `<td style="color:var(--green-accent)">${pts??'—'}</td>`;
                    }).join('')}
                    <td class="out-col" style="color:var(--green-accent)">${p.frontSF||'—'}</td>
                    ${holes.slice(9).map(h => {
                      const s = ps[h.hole];
                      const pts = s!=null ? Math.max(0, 2-(s-effectivePar(h,p.tee||'yellow')-calcExtraStroke(p.handicap,effectiveSI(h,p.tee||'yellow'),holes.length))) : null;
                      return `<td style="color:var(--green-accent)">${pts??'—'}</td>`;
                    }).join('')}
                    <td class="in-col" style="color:var(--green-accent)">${p.backSF||'—'}</td>
                    <td class="tot-col" style="color:var(--green-accent);font-weight:600;">${p.stableford||'—'}</td>
                  </tr>
                  <tr style="font-size:11px;opacity:0.65;">
                    <td style="text-align:left;white-space:nowrap;color:var(--gold);">Hcp Score</td>
                    ${holes.slice(0,9).map(h => {
                      const s = ps[h.hole];
                      const hs = s!=null ? calcHandicapScore(s, effectivePar(h,p.tee||'yellow'), p.handicap, effectiveSI(h,p.tee||'yellow'), holes.length) : null;
                      const capped = s!=null && hs < s;
                      return `<td style="color:var(--gold)${capped?';font-weight:600;':''}">${hs??'—'}</td>`;
                    }).join('')}
                    <td class="out-col" style="color:var(--gold)">${holes.slice(0,9).reduce((a,h)=>{const s=ps[h.hole];return s!=null?a+calcHandicapScore(s,effectivePar(h,p.tee||'yellow'),p.handicap,effectiveSI(h,p.tee||'yellow'),holes.length):a;},0)||'—'}</td>
                    ${holes.slice(9).map(h => {
                      const s = ps[h.hole];
                      const hs = s!=null ? calcHandicapScore(s, effectivePar(h,p.tee||'yellow'), p.handicap, effectiveSI(h,p.tee||'yellow'), holes.length) : null;
                      const capped = s!=null && hs < s;
                      return `<td style="color:var(--gold)${capped?';font-weight:600;':''}">${hs??'—'}</td>`;
                    }).join('')}
                    <td class="in-col" style="color:var(--gold)">${holes.slice(9).reduce((a,h)=>{const s=ps[h.hole];return s!=null?a+calcHandicapScore(s,effectivePar(h,p.tee||'yellow'),p.handicap,effectiveSI(h,p.tee||'yellow'),holes.length):a;},0)||'—'}</td>
                    <td class="tot-col" style="color:var(--gold);font-weight:600;">${p.hcpScore||'—'}</td>
                  </tr>
                `;
              }).join('')}
            </tbody>
          </table>
        </div>
      </div>

      <div class="card mt-20">
        <div class="section-label" style="margin-bottom:12px;">Competition</div>

        ${getPlayingGroups(players, round.playerGroups || {}).map(g => {
          const gId = `g${g.num}`;
          const returned = round.competition?.pinkBall?.groups?.[gId]?.returned;
          const names = g.players.map(p => p.name).join(', ');
          const label = lb.length > g.players.length ? `Pink Ball · Group ${g.num}` : 'Pink Ball';
          return `
          <div style="display:flex;align-items:center;justify-content:space-between;padding:10px;background:rgba(236,72,153,0.07);border:1px solid rgba(236,72,153,0.2);border-radius:8px;margin-bottom:8px;">
            <div>
              <div style="font-size:13px;">${label}</div>
              <div style="font-size:11px;color:var(--muted);margin-top:2px;">${names} · returned = +2 pts each</div>
            </div>
            <button class="btn-sm pink-group-btn ${returned ? 'pink-active' : ''}" data-gid="${gId}">
              ${returned ? '✓ Returned' : 'Not returned'}
            </button>
          </div>`;
        }).join('')}

        <div class="section-label" style="margin-bottom:8px;">Points Breakdown</div>
        ${lb.map(p => {
          const competition = round.competition || {};
          const pScores = scores[p.id] || {};
          const twos = Object.values(pScores).filter(s => s === 2).length;
          let ldWins = 0, ldDistance = '';
          let ntpWins = 0, ntpDistances = [];
          let ntp2Wins = 0, ntp2Distances = [];
          for (const hc of Object.values(competition.holes || {})) {
            if (hc.longestDrive === p.id) { ldWins++; if (hc.longestDriveDistance) ldDistance = hc.longestDriveDistance; }
            if (hc.nearestPin === p.id) { ntpWins++; if (hc.nearestPinDistance) ntpDistances.push(hc.nearestPinDistance); }
            if (hc.nearestPinInTwo === p.id) { ntp2Wins++; if (hc.nearestPinInTwoDistance) ntp2Distances.push(hc.nearestPinInTwoDistance); }
          }
          const pen = competition.penalties?.[p.id] || {};
          const stdPenTotal = PENALTY_TYPES.reduce((s, { key }) => s + (pen[key] || 0), 0);
          const lostBalls = pen.lostBalls || 0;
          const notFore = pen.notShoutingFore || 0;
          const lostBallPen = lostBalls >= 6 ? -4 : lostBalls >= 3 ? -2 : 0;
          const lbPGNum = (round.playerGroups || {})[p.id] || 1;
          const pinkPts = competition.pinkBall?.groups?.[`g${lbPGNum}`]?.returned ? 2 : 0;
          const total = p.compPts;
          const hasData = twos > 0 || ldWins > 0 || ntpWins > 0 || ntp2Wins > 0 || pinkPts > 0 || stdPenTotal > 0 || lostBalls > 0 || notFore > 0;
          return `
            <div style="background:rgba(0,0,0,0.15);border-radius:8px;padding:10px;margin-bottom:6px;">
              <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:${hasData ? 6 : 0}px;">
                <span style="font-size:14px;font-weight:500;">${p.name}</span>
                <span style="font-size:15px;font-weight:700;color:${total > 0 ? 'var(--gold)' : total < 0 ? 'var(--danger)' : 'var(--muted)'};">${total >= 0 ? '+' : ''}${total} pts</span>
              </div>
              ${hasData ? `<div style="font-size:11px;color:var(--muted);display:flex;flex-wrap:wrap;gap:5px;">
                ${twos > 0 ? `<span style="color:var(--green-accent);">+${twos * 5} (${twos}× score 2)</span>` : ''}
                ${ldWins > 0 ? `<span style="color:var(--gold);">+${ldWins * 3} longest drive${ldDistance ? ` · ${ldDistance}` : ''}</span>` : ''}
                ${ntpWins > 0 ? `<span style="color:var(--birdie);">+${ntpWins * 2} nearest pin${ntpDistances.length ? ` · ${ntpDistances.join(', ')}` : ''}</span>` : ''}
                ${ntp2Wins > 0 ? `<span style="color:var(--birdie);">+${ntp2Wins * 2} nearest pin in 2${ntp2Distances.length ? ` · ${ntp2Distances.join(', ')}` : ''}</span>` : ''}
                ${pinkPts > 0 ? `<span style="color:#ec4899;">+${pinkPts} pink ball</span>` : ''}
                ${stdPenTotal > 0 ? `<span style="color:var(--danger);">−${stdPenTotal} penalties</span>` : ''}
                ${lostBallPen !== 0 ? `<span style="color:var(--danger);">${lostBallPen} lost balls (${lostBalls})</span>` : lostBalls > 0 ? `<span style="color:var(--muted);">${lostBalls} balls lost (no pen yet)</span>` : ''}
                ${notFore > 0 ? `<span style="color:var(--danger);">−${notFore * 2} not shouting fore</span>` : ''}
              </div>` : ''}
            </div>
          `;
        }).join('')}
      </div>

      <button class="btn btn-secondary mt-14" id="new-round-btn">Start New Round</button>
      <button class="btn mt-8" id="delete-round-btn"
        style="background:none;border:1px solid rgba(255,100,100,0.25);color:rgba(255,100,100,0.5);font-size:13px;">
        Delete Round
      </button>
    </div>
  `;

  players.forEach(p => {
    const inp = document.getElementById(`lb-hcp-${p.id}`);
    if (inp) inp.onchange = async (e) => {
      const n = parseFloat(e.target.value);
      if (isNaN(n) || n < 0 || n > 54) return;
      await update(ref(db, `${roomPath(state.roomCode)}/players/${p.id}`), { handicap: n });
    };
  });

  document.querySelectorAll('.pink-group-btn').forEach(btn => {
    btn.onclick = async () => {
      const gId = btn.dataset.gid;
      const current = state.round.competition?.pinkBall?.groups?.[gId]?.returned;
      await update(ref(db, `${roomPath(state.roomCode)}/competition/pinkBall/groups/${gId}`), { returned: !current });
    };
  });

  const navScoring = document.getElementById('nav-scoring');
  if (navScoring) navScoring.onclick = () => { state.view='scoring'; render(); };
  document.getElementById('nav-back').onclick = () => goBackFromRound();
  document.getElementById('delete-round-btn').onclick = () => deleteRound(state.roomCode, state.groupCode);
  document.getElementById('new-round-btn').onclick = () => {
    if (unsubscribe) unsubscribe();
    const url = new URL(window.location);
    url.searchParams.delete('room');
    window.history.replaceState({}, '', url);
    if (state.groupCode) {
      state.roomCode = null; state.playerName = null; state.round = null;
      state.currentHole = 1; state.editingHoles = false;
      state.view = 'group-home';
    } else {
      state = { view:'join', roomCode:null, playerName:null, round:null, currentHole:1, editingHoles:false, groupCode:null, group:null, groupPlayerName:null };
    }
    render();
  };
}

// ── Group Home ──
function renderGroupHome(root) {
  const group = state.group;
  const members = Object.values(group.members || {}).sort((a,b) => a.joinedAt - b.joinedAt);
  const groupRounds = Object.entries(group.rounds || {})
    .map(([code, r]) => ({ code, ...r }))
    .sort((a,b) => (b.date||'').localeCompare(a.date||'') || b.createdAt - a.createdAt);

  const joinUrl = new URL(window.location.href);
  joinUrl.searchParams.delete('room');
  joinUrl.searchParams.set('group', state.groupCode);

  root.innerHTML = `
    <div class="fade-in">
      <div class="card" style="margin-bottom:16px;">
        <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;">
          <div style="flex:1;min-width:0;">
            <div style="display:flex;align-items:center;gap:8px;">
              <div id="group-name-display" style="font-family:'Playfair Display',serif;font-size:20px;color:#b8ddc4;">${group.name}</div>
              <button class="btn-sm" id="edit-group-name-btn" style="flex-shrink:0;">✎</button>
            </div>
            <div style="font-size:11px;color:var(--muted);margin-top:3px;">
              Code: <strong style="color:var(--green-accent);letter-spacing:0.1em;">${state.groupCode}</strong>
            </div>
          </div>
          <button class="btn-sm" id="copy-group-btn" style="flex-shrink:0;">📋 Share</button>
        </div>
      </div>

      <div class="card" style="margin-bottom:16px;">
        <div class="section-label">Members</div>
        ${members.map(m => `
          <div class="player-row" id="mrow-${m.id}">
            <div class="player-name" style="flex:1;min-width:0;">
              <div id="mname-${m.id}" style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">
                <span>${m.name}${m.name === state.groupPlayerName ? ' <span style="font-size:11px;color:var(--green-accent);">(you)</span>' : ''}</span>
                <button class="btn-sm edit-name-btn" data-id="${m.id}" data-name="${m.name}"
                  style="padding:2px 7px;font-size:10px;">✎</button>
              </div>
              <div id="confirm-remove-${m.id}"></div>
            </div>
            <div style="display:flex;align-items:center;gap:6px;flex-shrink:0;">
              <div style="display:flex;flex-direction:column;align-items:flex-end;gap:2px;">
                <div style="display:flex;align-items:center;gap:6px;">
                  <span class="player-hcp">HCP</span>
                  <input type="number" class="hcp-inline" id="ghcp-${m.id}"
                    value="${m.handicap ?? 0}" min="0" max="54" step="0.1"
                    style="width:52px;padding:4px 6px;font-size:13px;">
                </div>
                <span id="sugg-${m.id}" style="font-size:10px;color:var(--gold);opacity:0.75;letter-spacing:0.04em;min-height:14px;">Loading...</span>
              </div>
              <button class="remove-btn remove-member-btn" data-id="${m.id}" data-name="${m.name}"
                title="Remove member">✕</button>
            </div>
          </div>
        `).join('')}
        <div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border);">
          <div class="section-label" style="margin-bottom:8px;">Add Member</div>
          <div style="display:flex;gap:8px;flex-wrap:wrap;">
            <input type="text" id="add-member-name" placeholder="Name" style="flex:1;min-width:100px;">
            <input type="number" id="add-member-hcp" placeholder="HCP" min="0" max="54" step="0.1" style="width:66px;">
            <button class="btn-sm" id="add-member-btn" style="padding:5px 14px;">+ Add</button>
          </div>
        </div>
      </div>

      <button class="btn btn-primary" id="new-group-round-btn" style="margin-bottom:20px;">+ New Round</button>

      <div class="section-label" style="margin-bottom:10px;">Rounds</div>
      ${groupRounds.length === 0 ? `
        <div style="text-align:center;padding:32px 16px;color:var(--muted);font-size:13px;">
          No rounds yet — start the first one!
        </div>
      ` : groupRounds.map(r => `
        <div class="round-row" id="rr-${r.code}">
          <div class="round-row-left">
            <div class="round-row-day">${r.date ? new Date(r.date+'T12:00:00').getDate() : '?'}</div>
            <div class="round-row-mon">${r.date ? new Date(r.date+'T12:00:00').toLocaleDateString('en-GB',{month:'short'}) : ''}</div>
          </div>
          <div class="round-row-info">
            <div class="round-row-course">${r.courseName || 'Unknown course'}</div>
            <div class="round-row-players">${r.playerNames || ''}</div>
          </div>
          <span class="status-pip ${r.status||'setup'}">
            ${r.status==='complete'?'Complete':r.status==='scoring'?'Live':'Pending'}
          </span>
          <button class="del-round-btn" data-code="${r.code}"
            style="background:none;border:none;color:rgba(255,100,100,0.4);font-size:18px;cursor:pointer;padding:4px;flex-shrink:0;line-height:1;"
            title="Delete round">🗑</button>
        </div>
      `).join('')}

      <div class="section-label" style="margin-top:24px;margin-bottom:10px;">Tournaments</div>
      ${(() => {
        const tournaments = Object.entries(group.tournaments || {})
          .map(([id, t]) => ({ id, ...t }))
          .sort((a,b) => b.createdAt - a.createdAt);
        return (tournaments.length === 0 ? `
          <div style="text-align:center;padding:16px;color:var(--muted);font-size:13px;">No tournaments yet</div>
        ` : tournaments.map(t => {
          const roundCount = Object.keys(t.rounds || {}).length;
          return `
            <div class="round-row" id="tr-${t.id}" style="cursor:pointer;">
              <div class="round-row-info" style="flex:1;">
                <div class="round-row-course">${t.name}</div>
                <div class="round-row-players">${roundCount} round${roundCount !== 1 ? 's' : ''}</div>
              </div>
              <span class="status-pip ${t.status||'active'}">${t.status==='complete'?'Complete':'Active'}</span>
            </div>
          `;
        }).join('')) + `
        <div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap;" id="new-tournament-form">
          <input type="text" id="tournament-name-input" placeholder="Tournament name" style="flex:1;min-width:120px;">
          <button class="btn-sm" id="create-tournament-btn" style="padding:5px 14px;">+ Create</button>
        </div>`;
      })()}

      <button class="btn btn-secondary mt-20" id="leave-group-btn">← Back to Home</button>
    </div>
  `;

  document.getElementById('copy-group-btn').onclick = () => {
    navigator.clipboard.writeText(joinUrl.toString()).then(()=>toast('Group link copied!')).catch(()=>toast('Copy failed','error'));
  };

  members.forEach(m => {
    const inp = document.getElementById(`ghcp-${m.id}`);
    if (inp) inp.onchange = async (e) => {
      const n = parseFloat(e.target.value);
      if (isNaN(n) || n < 0 || n > 54) return;
      await update(ref(db, `${groupPath(state.groupCode)}/members/${m.id}`), { handicap: n });
    };
  });

  loadSuggestedHandicaps(group, members).then(suggestions => {
    members.forEach(m => {
      const span = document.getElementById(`sugg-${m.id}`);
      if (!span) return;
      const sugg = suggestions.get(m.id);
      span.textContent = sugg != null ? `Suggested: ${sugg.toFixed(1)}` : '';
    });
  }).catch(() => {
    members.forEach(m => {
      const span = document.getElementById(`sugg-${m.id}`);
      if (span) span.textContent = '';
    });
  });

  // Edit group name
  document.getElementById('edit-group-name-btn').onclick = () => {
    const display = document.getElementById('group-name-display');
    const editBtn = document.getElementById('edit-group-name-btn');
    const currentName = group.name;
    display.innerHTML = `
      <input type="text" id="group-name-input" value="${currentName}"
        style="font-size:16px;padding:3px 8px;max-width:160px;">
      <button class="btn-sm" id="save-group-name-btn" style="padding:3px 10px;">Save</button>
      <button class="btn-sm" id="cancel-group-name-btn" style="padding:3px 10px;opacity:0.6;">✕</button>
    `;
    editBtn.style.display = 'none';
    document.getElementById('save-group-name-btn').onclick = async () => {
      const val = document.getElementById('group-name-input').value.trim();
      if (!val) { toast('Name cannot be empty', 'error'); return; }
      await update(ref(db, groupPath(state.groupCode)), { name: val });
      saveGroupSession(state.groupCode, state.groupPlayerName, val);
    };
    document.getElementById('cancel-group-name-btn').onclick = () => {
      display.textContent = currentName;
      editBtn.style.display = '';
    };
  };

  // Edit member names
  root.querySelectorAll('.edit-name-btn').forEach(btn => {
    btn.onclick = () => {
      const id = btn.dataset.id;
      const currentName = btn.dataset.name;
      const nameDiv = document.getElementById(`mname-${id}`);
      nameDiv.innerHTML = `
        <input type="text" id="mname-input-${id}" value="${currentName}"
          style="font-size:13px;padding:3px 8px;max-width:130px;">
        <button class="btn-sm" id="save-mname-${id}" style="padding:3px 10px;">Save</button>
        <button class="btn-sm" id="cancel-mname-${id}" style="padding:3px 10px;opacity:0.6;">✕</button>
      `;
      document.getElementById(`save-mname-${id}`).onclick = async () => {
        const val = document.getElementById(`mname-input-${id}`).value.trim();
        if (!val) { toast('Name cannot be empty', 'error'); return; }
        await update(ref(db, `${groupPath(state.groupCode)}/members/${id}`), { name: val });
        if (currentName === state.groupPlayerName) {
          state.groupPlayerName = val;
          saveGroupSession(state.groupCode, val, state.group.name);
        }
      };
      document.getElementById(`cancel-mname-${id}`).onclick = () => {
        nameDiv.innerHTML = `
          <span>${currentName}${currentName === state.groupPlayerName ? ' <span style="font-size:11px;color:var(--green-accent);">(you)</span>' : ''}</span>
          <button class="btn-sm edit-name-btn" data-id="${id}" data-name="${currentName}"
            style="padding:2px 7px;font-size:10px;">✎</button>
        `;
        // Re-bind the edit button
        nameDiv.querySelector('.edit-name-btn').onclick = btn.onclick;
      };
    };
  });

  // Remove members (two-step confirmation)
  root.querySelectorAll('.remove-member-btn').forEach(btn => {
    btn.onclick = () => {
      const id = btn.dataset.id;
      const name = btn.dataset.name;
      const confirmDiv = document.getElementById(`confirm-remove-${id}`);
      if (confirmDiv.innerHTML) {
        // Already showing confirmation — dismiss it
        confirmDiv.innerHTML = '';
        btn.style.opacity = '';
        return;
      }
      btn.style.opacity = '0.3';
      confirmDiv.innerHTML = `
        <div style="margin-top:4px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;">
          <span style="font-size:11px;color:var(--muted);">Remove ${name}?</span>
          <button class="btn-sm" id="confirm-rm-${id}"
            style="padding:2px 10px;font-size:11px;background:rgba(255,80,80,0.15);color:#f87171;border-color:#f87171;">
            Confirm
          </button>
          <button class="btn-sm" id="cancel-rm-${id}" style="padding:2px 10px;font-size:11px;">Cancel</button>
        </div>
      `;
      document.getElementById(`confirm-rm-${id}`).onclick = async () => {
        await set(ref(db, `${groupPath(state.groupCode)}/members/${id}`), null);
        toast(`${name} removed from group`);
      };
      document.getElementById(`cancel-rm-${id}`).onclick = () => {
        confirmDiv.innerHTML = '';
        btn.style.opacity = '';
      };
    };
  });

  document.getElementById('add-member-btn').onclick = async () => {
    const nameEl = document.getElementById('add-member-name');
    const hcpEl = document.getElementById('add-member-hcp');
    const name = nameEl.value.trim();
    const hcp = parseFloat(hcpEl.value) || 0;
    if (!name) { toast('Enter a name', 'error'); return; }
    if (members.find(m => m.name.toLowerCase() === name.toLowerCase())) {
      toast('Already in group', 'error'); return;
    }
    const memberId = 'p_' + Date.now();
    await update(ref(db, `${groupPath(state.groupCode)}/members`), {
      [memberId]: { name, handicap: hcp, tee: 'yellow', id: memberId, joinedAt: Date.now() }
    });
    nameEl.value = ''; hcpEl.value = '';
    toast(`${name} added to group!`);
  };

  document.getElementById('new-group-round-btn').onclick = () => { state.view = 'new-group-round'; render(); };
  document.getElementById('leave-group-btn').onclick = () => {
    if (groupUnsubscribe) groupUnsubscribe();
    state.groupCode = null; state.group = null; state.groupPlayerName = null;
    state.view = 'join';
    const url = new URL(window.location); url.searchParams.delete('group'); window.history.replaceState({},'' ,url);
    render();
  };
  groupRounds.forEach(r => {
    const el = document.getElementById(`rr-${r.code}`);
    if (el) el.onclick = (e) => {
      if (e.target.closest('.del-round-btn')) return; // handled separately
      joinRound(r.code, state.groupPlayerName);
    };
  });
  root.querySelectorAll('.del-round-btn').forEach(btn => {
    btn.onclick = (e) => { e.stopPropagation(); deleteRound(btn.dataset.code, state.groupCode); };
  });

  // Tournaments
  Object.entries(group.tournaments || {}).forEach(([id]) => {
    const el = document.getElementById(`tr-${id}`);
    if (el) el.onclick = () => { state.tournamentId = id; state.view = 'tournament-detail'; render(); };
  });
  document.getElementById('create-tournament-btn').onclick = async () => {
    const input = document.getElementById('tournament-name-input');
    const name = input.value.trim();
    if (!name) { toast('Enter a tournament name', 'error'); return; }
    await createTournament(name);
    input.value = '';
  };
}

// ── Tournament functions ──
async function createTournament(name) {
  const id = 't_' + Date.now();
  await set(ref(db, `${groupPath(state.groupCode)}/tournaments/${id}`), {
    name, createdAt: Date.now(), status: 'active', rounds: {}
  });
  state.tournamentId = id;
  state.view = 'tournament-detail';
  render();
}

async function addRoundToTournament(roundCode) {
  await update(ref(db, `${groupPath(state.groupCode)}/tournaments/${state.tournamentId}/rounds`), { [roundCode]: true });
}

async function removeRoundFromTournament(roundCode) {
  await set(ref(db, `${groupPath(state.groupCode)}/tournaments/${state.tournamentId}/rounds/${roundCode}`), null);
}

async function loadTournamentRankings(roundCodes) {
  if (!roundCodes.length) return [];
  const snapshots = await Promise.all(roundCodes.map(code => get(ref(db, roomPath(code)))));
  const playerMap = new Map();

  for (const snap of snapshots) {
    if (!snap.exists()) continue;
    const round = snap.val();
    if (round.status !== 'complete') continue;
    const holes = round.holes || DEFAULT_HOLES;
    const players = Object.values(round.players || {});

    for (const player of players) {
      const scores = round.scores?.[player.id] || {};
      const played = Object.values(scores).filter(s => s != null && s > 0).length;
      if (played === 0) continue;

      let sf = 0;
      for (const hole of holes) {
        const score = scores[hole.hole];
        if (score == null) continue;
        const par = effectivePar(hole, player.tee || 'yellow');
        const si  = effectiveSI(hole, player.tee || 'yellow');
        const extras = calcExtraStroke(player.handicap || 0, si, holes.length);
        const stableford = Math.max(0, par + 2 + extras - score);
        sf += stableford;
      }

      const breakdown = calcCompetitionBreakdown(player.id, round);
      const key = player.name.toLowerCase();
      if (!playerMap.has(key)) {
        playerMap.set(key, { name: player.name, rounds: 0, totalSF: 0, bestSF: -Infinity, totalComp: 0, totalCompGained: 0, totalCompLost: 0 });
      }
      const entry = playerMap.get(key);
      entry.rounds++;
      entry.totalSF += sf;
      entry.totalComp += breakdown.net;
      entry.totalCompGained += breakdown.gained;
      entry.totalCompLost += breakdown.lost;
      if (sf > entry.bestSF) entry.bestSF = sf;
    }
  }

  return Array.from(playerMap.values())
    .map(e => ({ ...e, bestSF: e.bestSF === -Infinity ? 0 : e.bestSF }))
    .sort((a, b) => b.totalSF - a.totalSF);
}

function renderTournamentDetail(root) {
  const group = state.group;
  const tournament = group.tournaments?.[state.tournamentId];
  if (!tournament) { state.view = 'group-home'; render(); return; }

  const tournamentRoundCodes = Object.keys(tournament.rounds || {});
  const allGroupRounds = Object.entries(group.rounds || {}).map(([code, r]) => ({ code, ...r }));
  const tournamentRounds = allGroupRounds
    .filter(r => tournamentRoundCodes.includes(r.code))
    .sort((a,b) => (b.date||'').localeCompare(a.date||'') || b.createdAt - a.createdAt);
  const eligibleToAdd = allGroupRounds
    .filter(r => !tournamentRoundCodes.includes(r.code))
    .sort((a,b) => (b.date||'').localeCompare(a.date||'') || b.createdAt - a.createdAt);

  root.innerHTML = `
    <div class="fade-in">
      <div class="card" style="margin-bottom:16px;">
        <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;">
          <button class="btn-sm" id="back-to-group-btn">← Group</button>
          <div style="flex:1;min-width:0;text-align:center;">
            <div id="t-name-display" style="font-family:'Playfair Display',serif;font-size:18px;color:#b8ddc4;">${tournament.name}</div>
          </div>
          <button class="btn-sm" id="t-status-btn" style="${tournament.status==='complete'?'opacity:0.7;':''}">
            ${tournament.status==='complete'?'Reopen':'Complete'}
          </button>
        </div>
      </div>

      <div class="section-label" style="margin-bottom:10px;">Rankings</div>
      <div id="rankings-container">
        <div style="text-align:center;padding:20px;color:var(--muted);font-size:13px;">Loading…</div>
      </div>

      <div class="section-label" style="margin-top:24px;margin-bottom:10px;">Rounds in Tournament</div>
      ${tournamentRounds.length === 0 ? `
        <div style="text-align:center;padding:16px;color:var(--muted);font-size:13px;">No rounds yet</div>
      ` : tournamentRounds.map(r => `
        <div class="round-row" id="tr-round-${r.code}">
          <div class="round-row-left">
            <div class="round-row-day">${r.date ? new Date(r.date+'T12:00:00').getDate() : '?'}</div>
            <div class="round-row-mon">${r.date ? new Date(r.date+'T12:00:00').toLocaleDateString('en-GB',{month:'short'}) : ''}</div>
          </div>
          <div class="round-row-info" style="flex:1;">
            <div class="round-row-course">${r.courseName || 'Unknown course'}</div>
            <div class="round-row-players">${r.playerNames || ''}</div>
          </div>
          <span class="status-pip ${r.status||'setup'}">${r.status==='complete'?'Complete':r.status==='scoring'?'Live':'Pending'}</span>
          <button class="del-round-btn remove-t-round-btn" data-code="${r.code}"
            style="background:none;border:none;color:rgba(255,100,100,0.4);font-size:18px;cursor:pointer;padding:4px;flex-shrink:0;line-height:1;"
            title="Remove from tournament">🗑</button>
        </div>
      `).join('')}

      <div style="display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;">
        <button class="btn btn-primary" id="t-new-round-btn" style="flex:1;min-width:130px;">+ New Round</button>
        ${eligibleToAdd.length > 0 ? `<button class="btn btn-secondary" id="t-show-add-btn" style="flex:1;min-width:130px;">+ Add Round</button>` : ''}
      </div>

      ${eligibleToAdd.length > 0 ? `
        <div id="t-add-round-list" style="display:none;margin-top:12px;">
          <div class="section-label" style="margin-bottom:8px;">Add Existing Round</div>
          ${eligibleToAdd.map(r => `
            <div class="round-row add-eligible-round" data-code="${r.code}" style="cursor:pointer;">
              <div class="round-row-left">
                <div class="round-row-day">${r.date ? new Date(r.date+'T12:00:00').getDate() : '?'}</div>
                <div class="round-row-mon">${r.date ? new Date(r.date+'T12:00:00').toLocaleDateString('en-GB',{month:'short'}) : ''}</div>
              </div>
              <div class="round-row-info">
                <div class="round-row-course">${r.courseName || 'Unknown course'}</div>
                <div class="round-row-players">${r.playerNames || ''}</div>
              </div>
              <span class="status-pip ${r.status||'setup'}">${r.status==='complete'?'Complete':r.status==='scoring'?'Live':'Pending'}</span>
            </div>
          `).join('')}
        </div>
      ` : ''}
    </div>
  `;

  document.getElementById('back-to-group-btn').onclick = () => { state.view = 'group-home'; render(); };

  document.getElementById('t-status-btn').onclick = async () => {
    const newStatus = tournament.status === 'complete' ? 'active' : 'complete';
    await update(ref(db, `${groupPath(state.groupCode)}/tournaments/${state.tournamentId}`), { status: newStatus });
  };

  document.getElementById('t-new-round-btn').onclick = () => { state.view = 'new-group-round'; render(); };

  const showAddBtn = document.getElementById('t-show-add-btn');
  if (showAddBtn) {
    showAddBtn.onclick = () => {
      const list = document.getElementById('t-add-round-list');
      list.style.display = list.style.display === 'none' ? 'block' : 'none';
    };
  }

  root.querySelectorAll('.add-eligible-round').forEach(el => {
    el.onclick = async () => {
      await addRoundToTournament(el.dataset.code);
      toast('Round added to tournament');
    };
  });

  root.querySelectorAll('.remove-t-round-btn').forEach(btn => {
    btn.onclick = async (e) => {
      e.stopPropagation();
      await removeRoundFromTournament(btn.dataset.code);
      toast('Round removed from tournament');
    };
  });

  tournamentRounds.forEach(r => {
    const el = document.getElementById(`tr-round-${r.code}`);
    if (el) el.onclick = (e) => {
      if (e.target.closest('.remove-t-round-btn')) return;
      joinRound(r.code, state.groupPlayerName);
    };
  });

  // Load rankings async
  loadTournamentRankings(tournamentRoundCodes).then(rankings => {
    const container = document.getElementById('rankings-container');
    if (!container) return;
    if (rankings.length === 0) {
      container.innerHTML = `<div style="text-align:center;padding:16px;color:var(--muted);font-size:13px;">No completed rounds yet</div>`;
      return;
    }
    container.innerHTML = `
      <div style="overflow-x:auto;">
        <table style="width:100%;border-collapse:collapse;font-size:13px;">
          <thead>
            <tr style="color:var(--muted);text-align:left;border-bottom:1px solid var(--border);">
              <th style="padding:6px 4px;">#</th>
              <th style="padding:6px 4px;">Player</th>
              <th style="padding:6px 4px;text-align:center;">Rnds</th>
              <th style="padding:6px 4px;text-align:center;">Total SF</th>
              <th style="padding:6px 4px;text-align:center;">Best SF</th>
              <th style="padding:6px 4px;text-align:center;">Comp (net)</th>
            </tr>
          </thead>
          <tbody>
            ${rankings.map((p,i) => `
              <tr style="border-bottom:1px solid rgba(255,255,255,0.05);">
                <td style="padding:8px 4px;color:var(--muted);">${i+1}</td>
                <td style="padding:8px 4px;font-weight:600;">${p.name}</td>
                <td style="padding:8px 4px;text-align:center;color:var(--muted);">${p.rounds}</td>
                <td style="padding:8px 4px;text-align:center;color:var(--green-accent);font-weight:700;">${p.totalSF}</td>
                <td style="padding:8px 4px;text-align:center;color:var(--gold);">${p.bestSF}</td>
                <td style="padding:8px 4px;text-align:center;">
                  <div style="font-weight:700;color:${p.totalComp > 0 ? 'var(--gold)' : p.totalComp < 0 ? 'var(--danger)' : 'var(--muted)'};">${p.totalComp >= 0 ? '+' : ''}${p.totalComp}</div>
                  ${(p.totalCompGained > 0 || p.totalCompLost > 0) ? `<div style="font-size:10px;white-space:nowrap;margin-top:2px;">${p.totalCompGained > 0 ? `<span style="color:var(--gold);">+${p.totalCompGained}</span>` : ''}${p.totalCompLost > 0 ? `<span style="color:var(--danger);"> −${p.totalCompLost}</span>` : ''}</div>` : ''}
                </td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
    `;
  }).catch(() => {
    const container = document.getElementById('rankings-container');
    if (container) container.innerHTML = `<div style="text-align:center;padding:16px;color:rgba(255,100,100,0.6);font-size:13px;">Failed to load rankings</div>`;
  });
}

// ── New Group Round ──
function renderNewGroupRound(root) {
  const group = state.group;
  const members = Object.values(group.members || {}).sort((a,b) => a.joinedAt - b.joinedAt);
  const selected = new Set(members.filter(m => m.name === state.groupPlayerName).map(m => m.id));
  // HCP overrides (editable before creating)
  const hcpOverrides = {};
  members.forEach(m => { hcpOverrides[m.id] = m.handicap || 0; });

  function getSelected() { return members.filter(m => selected.has(m.id)); }

  function renderPills() {
    const container = document.getElementById('player-pills');
    if (!container) return;
    container.innerHTML = members.map(m => `
      <button class="player-pill ${selected.has(m.id)?'selected':''} ${m.name===state.groupPlayerName?'locked':''}"
        id="pill-${m.id}">
        ${m.name}${m.name===state.groupPlayerName?' (you)':''}
      </button>
    `).join('');
    members.forEach(m => {
      const pill = document.getElementById(`pill-${m.id}`);
      if (pill && m.name !== state.groupPlayerName) {
        pill.onclick = () => {
          if (selected.has(m.id)) selected.delete(m.id); else selected.add(m.id);
          renderPills();
          renderHcpInputs();
        };
      }
    });
  }

  function renderHcpInputs() {
    const container = document.getElementById('hcp-inputs');
    if (!container) return;
    const sel = getSelected();
    container.innerHTML = sel.length === 0 ? '' : `
      <div style="margin-top:14px;padding-top:14px;border-top:1px solid var(--border);">
        <div class="section-label" style="margin-bottom:8px;">Handicaps &amp; Tees</div>
        ${sel.map(m => {
          const courseTees = (document.getElementById('course-select')?.value &&
            COURSES[document.getElementById('course-select').value]?.tees) || [];
          return `
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">
            <span style="flex:1;font-size:13px;">${m.name}</span>
            ${courseTees.length > 0 ? `
              <select id="tee-new-${m.id}" style="width:80px;padding:4px 6px;font-size:12px;">
                ${courseTees.map(t=>`<option value="${t}" ${(m.tee||'yellow')===t?'selected':''}>${TEE_INFO[t]?.label||t}</option>`).join('')}
              </select>
            ` : ''}
            <input type="number" id="hcp-new-${m.id}" value="${hcpOverrides[m.id]??m.handicap??0}"
              min="0" max="54" step="0.1" style="width:64px;padding:4px 6px;font-size:13px;">
          </div>`;
        }).join('')}
      </div>
    `;
  }

  root.innerHTML = `
    <div class="fade-in">
      <div class="card">
        <div class="section-label">New Round</div>
        <div style="margin-bottom:10px;">
          <div style="font-size:10px;color:var(--muted);letter-spacing:0.1em;margin-bottom:5px;">DATE</div>
          <input type="date" id="round-date" value="${todayDate()}">
        </div>
        <div style="margin-bottom:10px;">
          <div style="font-size:10px;color:var(--muted);letter-spacing:0.1em;margin-bottom:5px;">COURSE</div>
          <select id="course-select">
            <option value="">-- Select a course --</option>
            ${Object.entries(COURSES).map(([k,c])=>`<option value="${k}">${c.name}, ${c.location}</option>`).join('')}
            <option value="other">Other / Custom</option>
          </select>
          <input type="text" id="new-course" placeholder="Course name" style="margin-top:8px;display:none;">
          <div id="new-cr-slope" style="display:none;gap:8px;margin-top:8px;">
            <input type="number" id="new-cr" placeholder="Course Rating (e.g. 69.5)" step="0.1" style="flex:1;">
            <input type="number" id="new-slope" placeholder="Slope (e.g. 113)" step="1" style="flex:1;">
          </div>
        </div>
        <div>
          <div style="font-size:10px;color:var(--muted);letter-spacing:0.1em;margin-bottom:8px;">WHO'S PLAYING?</div>
          <div id="player-pills" style="display:flex;flex-wrap:wrap;"></div>
        </div>
        <div id="hcp-inputs"></div>
      </div>

      <button class="btn btn-primary" id="create-group-round-btn">Create Round →</button>
      <button class="btn btn-secondary mt-8" id="back-btn">← Back</button>
    </div>
  `;

  renderPills();
  renderHcpInputs();

  document.getElementById('course-select').onchange = (e) => {
    const isOther = e.target.value === 'other';
    document.getElementById('new-course').style.display = isOther ? 'block' : 'none';
    document.getElementById('new-cr-slope').style.display = isOther ? 'flex' : 'none';
    renderHcpInputs();
  };

  document.getElementById('back-btn').onclick = () => {
    state.view = state.tournamentId ? 'tournament-detail' : 'group-home';
    render();
  };

  document.getElementById('create-group-round-btn').onclick = async () => {
    const courseKey = document.getElementById('course-select').value;
    const date = document.getElementById('round-date').value || todayDate();
    if (!courseKey) { toast('Select a course', 'error'); return; }
    if (selected.size === 0) { toast('Select at least one player', 'error'); return; }
    let courseName, holes, courseRating = null, slopeRating = null;
    if (courseKey === 'other') {
      courseName = document.getElementById('new-course').value.trim() || 'Custom Course';
      holes = DEFAULT_HOLES;
      courseRating = parseFloat(document.getElementById('new-cr').value) || null;
      slopeRating = parseFloat(document.getElementById('new-slope').value) || null;
    } else {
      const c = COURSES[courseKey];
      courseName = `${c.name}, ${c.location}`;
      holes = c.holes;
    }
    // Collect final handicap/tee values from inputs
    const selectedMembers = getSelected().map(m => ({
      ...m,
      handicap: parseFloat(document.getElementById(`hcp-new-${m.id}`)?.value) ?? m.handicap ?? 0,
      tee: document.getElementById(`tee-new-${m.id}`)?.value || m.tee || 'yellow',
    }));
    await createGroupRound(courseName, holes, courseKey === 'other' ? null : courseKey, date, selectedMembers, courseRating, slopeRating);
  };
}

// ── Boot ──
const firebaseReady = tryInitFirebase();
const _bootParams = new URLSearchParams(window.location.search);
const _bootGroup = _bootParams.get('group');
if (_bootGroup && firebaseReady) {
  // Arriving via shared group link — fetch members and show identity selection
  const _pendingCode = _bootGroup.toUpperCase();
  state.pendingGroupCode = _pendingCode;
  state.view = 'group-join-identity';
  get(ref(db, groupPath(_pendingCode))).then(snap => {
    if (snap.exists()) state.pendingGroup = snap.val();
    render();
  }).catch(() => render());
} else {
  if (_bootGroup) {
    // Firebase not configured — fall back to pre-filling the join form
    setTimeout(() => {
      const el = document.getElementById('join-group-code');
      if (el) { el.value = _bootGroup.toUpperCase(); el.focus(); }
    }, 50);
  }
  render();
}
</script>
