<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Scorecard</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  :root {
    --green-deep: #0d2b1a;
    --green-mid: #164d2e;
    --green-bright: #1a7a40;
    --green-accent: #22c55e;
    --gold: #d4a843;
    --cream: #e8f0eb;
    --muted: rgba(232,240,235,0.45);
    --card: rgba(255,255,255,0.06);
    --border: rgba(255,255,255,0.09);
    --danger: #ef4444;
    --birdie: #3b82f6;
    --eagle: #10b981;
    --bogey: #f97316;
    --double: #ef4444;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    min-height: 100vh;
    background: linear-gradient(160deg, var(--green-deep) 0%, #1a3d28 50%, #0d2b1a 100%);
    font-family: 'DM Sans', sans-serif;
    color: var(--cream);
    overscroll-behavior: none;
  }
  /* Grain overlay */
  body::before {
    content: '';
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    opacity: 0.6;
  }

  #app { position: relative; z-index: 1; max-width: 680px; margin: 0 auto; padding: 0 16px 60px; }

  /* Header */
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 0 16px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 28px;
  }
  .logo { font-family: 'Playfair Display', serif; font-size: 18px; letter-spacing: 0.08em; color: #b8ddc4; display: flex; align-items: center; gap: 10px; }
  .logo-icon { font-size: 20px; }
  .room-badge {
    font-size: 11px; letter-spacing: 0.12em; color: var(--gold);
    background: rgba(212,168,67,0.12); border: 1px solid rgba(212,168,67,0.25);
    padding: 4px 10px; border-radius: 20px; font-weight: 500;
  }

  /* Nav tabs */
  .nav { display: flex; gap: 6px; margin-bottom: 24px; }
  .nav-btn {
    flex: 1; padding: 9px 4px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--card); color: var(--muted); font-family: 'DM Sans', sans-serif;
    font-size: 12px; letter-spacing: 0.06em; cursor: pointer; transition: all 0.2s;
    text-transform: uppercase;
  }
  .nav-btn.active { background: rgba(34,197,94,0.15); border-color: rgba(34,197,94,0.35); color: #b8ddc4; }

  /* Cards */
  .card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 14px; padding: 18px; margin-bottom: 14px;
  }
  .section-label {
    font-size: 10px; letter-spacing: 0.14em; color: var(--muted);
    text-transform: uppercase; margin-bottom: 12px;
  }

  /* Inputs */
  input[type=text], input[type=number], select {
    background: rgba(0,0,0,0.3); border: 1px solid var(--border);
    border-radius: 8px; color: var(--cream); padding: 10px 12px;
    font-family: 'DM Sans', sans-serif; font-size: 14px;
    width: 100%; outline: none; transition: border-color 0.2s;
  }
  input:focus, select:focus { border-color: rgba(34,197,94,0.4); }
  input::placeholder { color: rgba(232,240,235,0.2); }
  select option { background: #1a3d28; }

  /* Buttons */
  .btn {
    width: 100%; padding: 13px; border-radius: 10px; border: none;
    font-family: 'DM Sans', sans-serif; font-size: 14px; letter-spacing: 0.06em;
    cursor: pointer; transition: all 0.2s; text-transform: uppercase; font-weight: 500;
  }
  .btn-primary { background: var(--green-accent); color: #fff; box-shadow: 0 4px 20px rgba(34,197,94,0.25); }
  .btn-primary:hover { background: #16a34a; }
  .btn-secondary { background: var(--card); border: 1px solid var(--border); color: var(--muted); }
  .btn-secondary:hover { color: var(--cream); border-color: rgba(255,255,255,0.2); }
  .btn-sm {
    padding: 5px 12px; font-size: 11px; border-radius: 6px; border: 1px solid var(--border);
    background: var(--card); color: var(--muted); cursor: pointer; font-family: 'DM Sans', sans-serif;
    letter-spacing: 0.05em; transition: all 0.15s;
  }
  .btn-sm:hover { color: var(--cream); }

  /* Player row */
  .player-row {
    display: flex; align-items: center; gap: 10px;
    background: rgba(0,0,0,0.2); border-radius: 8px; padding: 10px 12px;
    margin-bottom: 6px;
  }
  .player-name { flex: 1; font-size: 15px; }
  .player-hcp { font-size: 12px; color: var(--muted); }
  .remove-btn { background: none; border: none; color: rgba(255,100,100,0.4); cursor: pointer; font-size: 18px; line-height: 1; padding: 0 2px; }
  .remove-btn:hover { color: var(--danger); }

  /* Hole dots */
  .hole-dots { display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; margin-bottom: 20px; }
  .hole-dot {
    width: 30px; height: 30px; border-radius: 50%; border: none;
    font-size: 11px; cursor: pointer; font-family: 'DM Sans', sans-serif;
    transition: all 0.15s; color: var(--muted);
    background: rgba(255,255,255,0.07);
  }
  .hole-dot.current { background: var(--green-accent); color: #fff; font-weight: 600; }
  .hole-dot.complete { background: rgba(34,197,94,0.25); color: #b8ddc4; }
  .hole-dot.partial { background: rgba(34,197,94,0.1); }

  /* Score entry */
  .score-card {
    background: rgba(0,0,0,0.2); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px 16px; margin-bottom: 8px;
    display: flex; align-items: center; gap: 12px;
  }
  .score-card.has-score { border-color: rgba(34,197,94,0.2); }
  .score-info { flex: 1; }
  .score-player-name { font-size: 15px; margin-bottom: 2px; }
  .score-hcp-note { font-size: 11px; color: var(--muted); }
  .score-controls { display: flex; align-items: center; gap: 6px; }
  .score-badge {
    font-size: 10px; padding: 2px 8px; border-radius: 20px;
    letter-spacing: 0.04em; font-weight: 500;
  }
  .adj-btn {
    width: 34px; height: 40px; border-radius: 7px; border: 1px solid var(--border);
    background: rgba(255,255,255,0.07); color: var(--cream); font-size: 18px;
    cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s;
  }
  .adj-btn:hover { background: rgba(255,255,255,0.12); }
  .adj-btn:disabled { opacity: 0.25; cursor: default; }
  .score-input {
    width: 50px !important; height: 40px; text-align: center !important;
    font-size: 20px !important; padding: 0 !important;
    font-family: 'Playfair Display', serif !important;
    color: #b8ddc4 !important;
  }

  /* Hole nav */
  .hole-nav { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; }
  .hole-arrow {
    width: 42px; height: 42px; border-radius: 10px; border: 1px solid var(--border);
    background: var(--card); color: var(--cream); font-size: 18px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all 0.15s; flex-shrink: 0;
  }
  .hole-arrow:disabled { opacity: 0.25; cursor: default; }
  .hole-title { flex: 1; text-align: center; }
  .hole-num { font-family: 'Playfair Display', serif; font-size: 30px; color: #b8ddc4; }
  .hole-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }

  /* Leaderboard */
  .lb-row {
    display: flex; align-items: center; gap: 14px;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px 16px; margin-bottom: 8px;
    transition: all 0.2s;
  }
  .lb-row.first { background: rgba(34,197,94,0.1); border-color: rgba(34,197,94,0.25); }
  .lb-medal { font-size: 22px; width: 28px; text-align: center; flex-shrink: 0; }
  .lb-player { flex: 1; }
  .lb-name { font-size: 16px; margin-bottom: 2px; }
  .lb-detail { font-size: 11px; color: var(--muted); }
  .lb-score { text-align: right; }
  .lb-net { font-family: 'Playfair Display', serif; font-size: 24px; }
  .lb-gross { font-size: 11px; color: var(--muted); margin-top: 2px; }

  /* Scorecard table */
  .sc-table { width: 100%; border-collapse: collapse; font-size: 11px; }
  .sc-table th, .sc-table td { padding: 5px 3px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.04); }
  .sc-table th { color: var(--muted); font-weight: 400; }
  .sc-table .out-col, .sc-table .in-col, .sc-table .tot-col { color: var(--gold); }

  /* Toast */
  .toast {
    position: fixed; top: 70px; left: 50%; transform: translateX(-50%);
    padding: 10px 20px; border-radius: 8px; font-size: 13px; z-index: 9999;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4); transition: opacity 0.3s;
    white-space: nowrap;
  }
  .toast.success { background: #16a34a; color: #fff; }
  .toast.error { background: var(--danger); color: #fff; }

  /* Join screen */
  .join-screen { text-align: center; padding: 40px 0; }
  .join-title { font-family: 'Playfair Display', serif; font-size: 32px; color: #b8ddc4; margin-bottom: 8px; }
  .join-sub { color: var(--muted); font-size: 14px; margin-bottom: 36px; }
  .or-divider { display: flex; align-items: center; gap: 12px; margin: 20px 0; color: var(--muted); font-size: 12px; }
  .or-divider::before, .or-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .room-code-display {
    font-family: 'Playfair Display', serif; font-size: 42px; letter-spacing: 0.2em;
    color: var(--gold); text-align: center; padding: 16px;
    background: rgba(212,168,67,0.08); border: 1px solid rgba(212,168,67,0.2);
    border-radius: 12px; margin: 12px 0;
  }

  /* Connection indicator */
  .conn-dot {
    width: 7px; height: 7px; border-radius: 50%; display: inline-block; margin-right: 5px;
  }
  .conn-dot.online { background: var(--green-accent); box-shadow: 0 0 6px rgba(34,197,94,0.6); }
  .conn-dot.offline { background: #ef4444; }
  .conn-status { font-size: 11px; color: var(--muted); display: flex; align-items: center; }

  /* Sync pulse */
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .syncing { animation: pulse 1s infinite; }

  /* Running totals */
  .totals-row { display: flex; justify-content: space-between; font-size: 13px; padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
  .totals-row:last-child { border-bottom: none; }

  /* Hole edit */
  .hole-edit-row { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; font-size: 12px; }
  .hole-edit-num { width: 22px; text-align: right; color: var(--muted); flex-shrink: 0; }

  /* Firebase config screen */
  .config-screen { padding: 8px 0; }
  .config-field { margin-bottom: 12px; }
  .config-label { font-size: 11px; color: var(--muted); letter-spacing: 0.06em; margin-bottom: 5px; }

  .mt-8 { margin-top: 8px; }
  .mt-14 { margin-top: 14px; }
  .mt-20 { margin-top: 20px; }
  .gap-8 { gap: 8px; }
  .flex { display: flex; }
  .hidden { display: none; }

  /* Group / round list */
  .round-row {
    display: flex; align-items: center; gap: 12px;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 14px; margin-bottom: 8px;
    cursor: pointer; transition: border-color 0.15s;
  }
  .round-row:hover { border-color: rgba(255,255,255,0.18); }
  .round-row-left { text-align: center; min-width: 44px; flex-shrink: 0; }
  .round-row-day { font-size: 18px; font-family: 'Playfair Display', serif; color: #b8ddc4; line-height: 1; }
  .round-row-mon { font-size: 10px; color: var(--gold); letter-spacing: 0.08em; text-transform: uppercase; }
  .round-row-info { flex: 1; min-width: 0; }
  .round-row-course { font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .round-row-players { font-size: 11px; color: var(--muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .status-pip { font-size: 10px; letter-spacing: 0.06em; padding: 3px 8px; border-radius: 10px; white-space: nowrap; flex-shrink: 0; }
  .status-pip.setup    { background: rgba(255,255,255,0.06); color: var(--muted); border: 1px solid var(--border); }
  .status-pip.scoring  { background: rgba(34,197,94,0.12); color: var(--green-accent); border: 1px solid rgba(34,197,94,0.25); }
  .status-pip.complete { background: rgba(212,168,67,0.12); color: var(--gold); border: 1px solid rgba(212,168,67,0.25); }

  /* Player select pills (new-group-round) */
  .player-pill {
    display: inline-flex; align-items: center;
    padding: 8px 16px; border-radius: 20px; margin: 4px;
    font-size: 14px; background: var(--card); border: 1px solid var(--border);
    color: var(--muted); cursor: pointer; transition: all 0.15s;
    font-family: 'DM Sans', sans-serif; user-select: none;
  }
  .player-pill.selected { background: rgba(34,197,94,0.15); border-color: rgba(34,197,94,0.4); color: #b8ddc4; }
  .player-pill.locked   { cursor: default; }

  /* Group badge */
  .group-badge {
    font-size: 11px; letter-spacing: 0.12em; color: #b8ddc4;
    background: rgba(26,122,64,0.2); border: 1px solid rgba(34,197,94,0.25);
    padding: 4px 10px; border-radius: 20px; font-weight: 500;
  }

  /* Date input */
  input[type=date] {
    background: rgba(0,0,0,0.3); border: 1px solid var(--border);
    border-radius: 8px; color: var(--cream); padding: 10px 12px;
    font-family: 'DM Sans', sans-serif; font-size: 14px;
    width: 100%; outline: none; transition: border-color 0.2s;
    color-scheme: dark;
  }
  input[type=date]:focus { border-color: rgba(34,197,94,0.4); }

  /* Inline HCP edit in score cards */
  .hcp-inline {
    width: 38px !important; padding: 1px 4px !important; font-size: 11px !important;
    text-align: center !important; height: auto !important; display: inline-block !important;
    border-radius: 4px !important; vertical-align: middle;
  }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }
  .fade-in { animation: fadeIn 0.25s ease; }
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="logo">
      <span class="logo-icon">⛳</span>
      <span>SCORECARD</span>
    </div>
    <div style="display:flex;align-items:center;gap:10px;">
      <div class="conn-status" id="conn-status">
        <span class="conn-dot offline" id="conn-dot"></span>
        <span id="conn-text">Offline</span>
      </div>
      <div class="room-badge hidden" id="room-badge"></div>
    </div>
  </header>

  <div id="view-root"></div>
</div>

<div class="toast hidden" id="toast"></div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, set, get, update, onValue, off, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const FIREBASE_CONFIG = {
  apiKey: "AIzaSyCdW0Se4LroWiBm0Psc0KY6YYDS-NFJ81s",
  authDomain: "golf-tracker-f9334.firebaseapp.com",
  databaseURL: "https://golf-tracker-f9334-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "golf-tracker-f9334",
  storageBucket: "golf-tracker-f9334.firebasestorage.app",
  messagingSenderId: "208051337835",
  appId: "1:208051337835:web:0221e91692bc5b37c10f2e"
};

const DEFAULT_HOLES = Array.from({length:18},(_,i)=>({
  hole: i+1,
  par: [3,4,5,4,4,4,3,5,4, 4,5,3,4,4,5,3,4,5][i] || 4,
  si: i+1
}));

const TEE_INFO = {
  white:  { label: 'White',  color: '#d1d5db' },
  yellow: { label: 'Yellow', color: '#fbbf24' },
  red:    { label: 'Red',    color: '#ef4444'  },
};

const COURSES = {
  'malkins-bank': {
    name: 'Malkins Bank',
    location: 'Sandbach',
    par: 70,
    tees: ['white','yellow','red'],
    holes: [
      { hole:1,  par:3, si:15, yards:{white:171,yellow:152,red:145} },
      { hole:2,  par:4, si:17, yards:{white:359,yellow:340,red:330} },
      { hole:3,  par:4, si:5,  yards:{white:388,yellow:371,red:365} },
      { hole:4,  par:4, si:1,  yards:{white:355,yellow:336,red:328} },
      { hole:5,  par:3, si:13, yards:{white:144,yellow:124,red:102} },
      { hole:6,  par:4, si:7,  yards:{white:368,yellow:358,red:357} },
      { hole:7,  par:4, si:3,  yards:{white:364,yellow:346,red:338} },
      { hole:8,  par:4, si:9,  yards:{white:369,yellow:349,red:335} },
      { hole:9,  par:4, si:11, yards:{white:377,yellow:358,red:349} },
      { hole:10, par:4, si:12, yards:{white:359,yellow:337,red:331} },
      { hole:11, par:5, si:6,  yards:{white:516,yellow:399,red:449} },
      { hole:12, par:3, si:10, yards:{white:164,yellow:138,red:132} },
      { hole:13, par:4, si:4,  yards:{white:329,yellow:308,red:301} },
      { hole:14, par:3, si:14, yards:{white:197,yellow:173,red:160} },
      { hole:15, par:4, si:18, yards:{white:338,yellow:317,red:293} },
      { hole:16, par:5, si:2,  yards:{white:498,yellow:455,red:437} },
      { hole:17, par:4, si:16, yards:{white:343,yellow:323,red:315} },
      { hole:18, par:4, si:8,  yards:{white:366,yellow:348,red:345} },
    ]
  }
};

let db = null;
let roundRef = null;
let unsubscribe = null;
let groupUnsubscribe = null;
let state = {
  view: 'join',       // join | config | setup | scoring | leaderboard | group-home | new-group-round
  roomCode: null,
  playerName: null,   // this device's player name in the current round
  round: null,        // live Firebase data
  currentHole: 1,
  editingHoles: false,
  configDone: false,
  groupCode: null,
  group: null,
  groupPlayerName: null,
};

// ── Helpers ──
function groupPath(code) { return `groups/${code}`; }
function todayDate() { return new Date().toISOString().slice(0,10); }
function formatDate(d) {
  if (!d) return '';
  const dt = new Date(d + 'T12:00:00');
  return dt.toLocaleDateString('en-GB', { weekday:'short', day:'numeric', month:'short' });
}

// ── Session persistence (localStorage) ──
function saveSession(roomCode, playerName, courseName) {
  const sessions = loadSessions().filter(s => s.roomCode !== roomCode);
  sessions.unshift({ roomCode, playerName, courseName: courseName || '', savedAt: Date.now() });
  localStorage.setItem('golf_sessions', JSON.stringify(sessions.slice(0, 5)));
}
function loadSessions() {
  try { return JSON.parse(localStorage.getItem('golf_sessions')) || []; } catch { return []; }
}
function forgetSession(roomCode) {
  const sessions = loadSessions().filter(s => s.roomCode !== roomCode);
  localStorage.setItem('golf_sessions', JSON.stringify(sessions));
}

// ── Group session persistence ──
function saveGroupSession(groupCode, playerName, groupName) {
  const sessions = loadGroupSessions().filter(s => s.groupCode !== groupCode);
  sessions.unshift({ groupCode, playerName, groupName: groupName || '', savedAt: Date.now() });
  localStorage.setItem('golf_group_sessions', JSON.stringify(sessions.slice(0, 3)));
}
function loadGroupSessions() {
  try { return JSON.parse(localStorage.getItem('golf_group_sessions')) || []; } catch { return []; }
}
function forgetGroupSession(groupCode) {
  const sessions = loadGroupSessions().filter(s => s.groupCode !== groupCode);
  localStorage.setItem('golf_group_sessions', JSON.stringify(sessions));
}

// ── Firebase init ──
function tryInitFirebase() {
  if (!FIREBASE_CONFIG.apiKey) return false;
  try {
    const app = initializeApp(FIREBASE_CONFIG);
    db = getDatabase(app);
    setConnected(true);
    return true;
  } catch(e) {
    console.error(e);
    return false;
  }
}

function setConnected(online) {
  document.getElementById('conn-dot').className = 'conn-dot ' + (online ? 'online' : 'offline');
  document.getElementById('conn-text').textContent = online ? 'Live' : 'Offline';
}

// ── Room code ──
function genCode() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  return Array.from({length:4}, ()=>chars[Math.floor(Math.random()*chars.length)]).join('');
}

function roomPath(code) { return `rounds/${code}`; }

// ── Toast ──
let toastTimer;
function toast(msg, type='success') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `toast ${type} fade-in`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>{ el.className='toast hidden'; }, 2800);
}

// ── Render dispatch ──
function render() {
  const root = document.getElementById('view-root');
  root.innerHTML = '';

  // Show room/group badge
  const badge = document.getElementById('room-badge');
  if (state.groupCode && (state.view === 'group-home' || state.view === 'new-group-round')) {
    badge.textContent = `GROUP ${state.groupCode}`;
    badge.className = 'group-badge';
    badge.classList.remove('hidden');
  } else if (state.roomCode && state.view !== 'join' && state.view !== 'config') {
    badge.textContent = `ROOM ${state.roomCode}`;
    badge.className = 'room-badge';
    badge.classList.remove('hidden');
  } else {
    badge.classList.add('hidden');
  }

  if (!FIREBASE_CONFIG.apiKey) {
    renderConfigScreen(root);
  } else if (state.view === 'join') {
    renderJoin(root);
  } else if (state.view === 'group-home') {
    renderGroupHome(root);
  } else if (state.view === 'new-group-round') {
    renderNewGroupRound(root);
  } else if (state.view === 'setup') {
    renderSetup(root);
  } else if (state.view === 'scoring') {
    renderScoring(root);
  } else if (state.view === 'leaderboard') {
    renderLeaderboard(root);
  }
}

// ── Create round ──
async function createRound(playerName, courseName, holes, courseKey, date) {
  const code = genCode();
  const playerId = 'p_' + Date.now();
  const roundData = {
    courseName: courseName || '',
    courseKey: courseKey || null,
    date: date || todayDate(),
    createdAt: Date.now(),
    createdBy: playerName,
    status: 'setup',
    holes: holes || DEFAULT_HOLES,
    players: {
      [playerId]: { name: playerName, handicap: 0, tee: 'yellow', id: playerId, joinedAt: Date.now() }
    },
    scores: {},
  };
  try {
    await set(ref(db, roomPath(code)), roundData);
    state.roomCode = code;
    state.playerName = playerName;
    state.round = roundData;
    state.view = 'setup';
    subscribeToRound(code);
    updateURL(code);
    saveSession(code, playerName, courseName);
    toast(`Round created! Share code: ${code}`);
    render();
  } catch(e) {
    toast('Failed to create round. Check Firebase config.', 'error');
    console.error(e);
  }
}

// ── Join round ──
async function joinRound(code, playerName) {
  try {
    const snap = await get(ref(db, roomPath(code)));
    if (!snap.exists()) { toast('Room not found. Check the code.', 'error'); return; }
    const data = snap.val();

    // Check if player already exists
    const existing = Object.values(data.players || {}).find(
      p => p.name.toLowerCase() === playerName.toLowerCase()
    );

    let playerId;
    if (existing) {
      playerId = existing.id;
      toast(`Welcome back, ${playerName}!`);
    } else {
      playerId = 'p_' + Date.now();
      await update(ref(db, `${roomPath(code)}/players`), {
        [playerId]: { name: playerName, handicap: 0, tee: 'yellow', id: playerId, joinedAt: Date.now() }
      });
      toast(`Joined round!`);
    }

    state.roomCode = code;
    state.playerName = playerName;
    state.round = data;
    state.view = data.status === 'scoring' ? 'scoring' : data.status === 'complete' ? 'leaderboard' : 'setup';
    subscribeToRound(code);
    updateURL(code);
    saveSession(code, playerName, data.courseName);
    render();
  } catch(e) {
    toast('Failed to join. Check your connection.', 'error');
    console.error(e);
  }
}

// ── Subscribe ──
function subscribeToRound(code) {
  if (unsubscribe) { off(ref(db, roomPath(code))); }
  const r = ref(db, roomPath(code));
  let prevStatus = null;
  onValue(r, (snap) => {
    if (!snap.exists()) return;
    const newData = snap.val();
    const statusChanged = prevStatus !== newData.status;
    prevStatus = newData.status;
    state.round = newData;
    if (state.round.status === 'scoring' && state.view === 'setup') state.view = 'scoring';
    if (state.round.status === 'complete' && statusChanged) state.view = 'leaderboard';
    render();
  });
  unsubscribe = () => off(r);
}

async function deleteRound(roundCode, groupCode) {
  if (!confirm('Delete this round? All scores will be lost and cannot be recovered.')) return;
  try {
    if (groupCode) await set(ref(db, `${groupPath(groupCode)}/rounds/${roundCode}`), null);
    await set(ref(db, roomPath(roundCode)), null);
    forgetSession(roundCode);
    if (state.roomCode === roundCode) goBackFromRound();
    else toast('Round deleted');
  } catch(e) {
    toast('Failed to delete — check Firebase rules allow deletion.', 'error');
    console.error(e);
  }
}

function goBackFromRound() {
  if (unsubscribe) unsubscribe();
  const url = new URL(window.location);
  url.searchParams.delete('room');
  window.history.replaceState({}, '', url);
  state.roomCode = null; state.playerName = null; state.round = null;
  state.currentHole = 1; state.editingHoles = false;
  state.view = state.groupCode ? 'group-home' : 'join';
  render();
}

function updateURL(code) {
  const url = new URL(window.location);
  url.searchParams.set('room', code);
  window.history.replaceState({}, '', url);
}

// ── Group functions ──
async function createGroup(groupName, playerName) {
  const code = genCode();
  const memberId = 'p_' + Date.now();
  const groupData = {
    name: groupName,
    createdAt: Date.now(),
    members: { [memberId]: { name: playerName, handicap: 0, tee: 'yellow', id: memberId, joinedAt: Date.now() } },
    rounds: {}
  };
  try {
    await set(ref(db, groupPath(code)), groupData);
    state.groupCode = code;
    state.group = groupData;
    state.groupPlayerName = playerName;
    state.view = 'group-home';
    subscribeToGroup(code);
    saveGroupSession(code, playerName, groupName);
    toast(`Group created! Code: ${code}`);
    render();
  } catch(e) { toast('Failed to create group.', 'error'); console.error(e); }
}

async function joinGroup(code, playerName) {
  try {
    const snap = await get(ref(db, groupPath(code)));
    if (!snap.exists()) { toast('Group not found. Check the code.', 'error'); return; }
    const data = snap.val();
    const existing = Object.values(data.members || {}).find(m => m.name.toLowerCase() === playerName.toLowerCase());
    if (!existing) {
      const memberId = 'p_' + Date.now();
      await update(ref(db, `${groupPath(code)}/members`), {
        [memberId]: { name: playerName, handicap: 0, tee: 'yellow', id: memberId, joinedAt: Date.now() }
      });
      toast(`Joined group: ${data.name}!`);
    } else {
      toast(`Welcome back, ${playerName}!`);
    }
    state.groupCode = code;
    state.group = data;
    state.groupPlayerName = playerName;
    state.view = 'group-home';
    subscribeToGroup(code);
    saveGroupSession(code, playerName, data.name);
    render();
  } catch(e) { toast('Failed to join group.', 'error'); console.error(e); }
}

function subscribeToGroup(code) {
  if (groupUnsubscribe) groupUnsubscribe();
  const r = ref(db, groupPath(code));
  onValue(r, (snap) => {
    if (!snap.exists()) return;
    state.group = snap.val();
    if (state.view === 'group-home') render();
  });
  groupUnsubscribe = () => off(r);
}

async function updateGroupRoundStatus(roundCode, status) {
  if (!state.groupCode) return;
  await update(ref(db, `${groupPath(state.groupCode)}/rounds/${roundCode}`), { status });
}

async function createGroupRound(courseName, holes, courseKey, date, selectedMembers) {
  const code = genCode();
  const playersObj = {};
  selectedMembers.forEach(m => {
    const pid = 'p_' + Date.now() + Math.random().toString(36).slice(2,6);
    playersObj[pid] = { name: m.name, handicap: m.handicap || 0, tee: m.tee || 'yellow', id: pid, joinedAt: Date.now() };
  });
  const roundData = {
    courseName, courseKey: courseKey || null, date, groupCode: state.groupCode,
    createdAt: Date.now(), createdBy: state.groupPlayerName, status: 'setup', holes, players: playersObj, scores: {}
  };
  try {
    await set(ref(db, roomPath(code)), roundData);
    const playerNames = selectedMembers.map(m => m.name).join(', ');
    await update(ref(db, `${groupPath(state.groupCode)}/rounds`), {
      [code]: { courseName, date, createdAt: Date.now(), status: 'setup', playerNames }
    });
    // Also update group member handicaps/tees from the selection
    const members = Object.values(state.group.members || {});
    for (const m of selectedMembers) {
      const gm = members.find(x => x.name.toLowerCase() === m.name.toLowerCase());
      if (gm) await update(ref(db, `${groupPath(state.groupCode)}/members/${gm.id}`), { handicap: m.handicap || gm.handicap, tee: m.tee || gm.tee });
    }
    state.roomCode = code;
    state.playerName = state.groupPlayerName;
    state.round = roundData;
    state.view = 'setup';
    subscribeToRound(code);
    updateURL(code);
    saveSession(code, state.groupPlayerName, courseName);
    toast('Round created!');
    render();
  } catch(e) { toast('Failed to create round.', 'error'); console.error(e); }
}

          <div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border);">
            <div class="section-label" style="margin-bottom:8px;">${groupMembers.length > 0 ? 'Or add manually' : 'Add Player'}</div>
            <div style="display:flex;gap:8px;flex-wrap:wrap;">
              <input type="text" id="add-player-name" placeholder="Player name" style="flex:1;min-width:100px;">
              ${courseTees.length > 0 ? `
                <select id="add-player-tee" style="width:80px;padding:4px 6px;font-size:12px;">
                  ${courseTees.map(t => `<option value="${t}">${TEE_INFO[t]?.label||t}</option>`).join('')}
                </select>
              ` : ''}
              <input type="number" id="add-player-hcp" placeholder="HCP" min="0" max="54" step="0.1" style="width:66px;">
              <button class="btn-sm" id="add-player-btn" style="padding:5px 14px;">+ Add</button>
            </div>
          </div>
        ` : `
          <div style="font-size:11px;color:var(--muted);margin-top:8px;">
            Others join by entering the room code on this page
          </div>
        `}
      </div>

      ${isOwner ? `
        <button class="btn btn-primary" id="start-round-btn">Start Round →</button>
      ` : `
        <div style="text-align:center;font-size:13px;color:var(--muted);padding:16px;">
          Waiting for someone to start the round...
        </div>
      `}
      <button class="btn btn-secondary mt-8" id="back-btn">← ${state.groupCode ? 'Back to Group' : 'Back to Home'}</button>
      <button class="btn mt-8" id="delete-round-btn"
        style="background:none;border:1px solid rgba(255,100,100,0.25);color:rgba(255,100,100,0.5);font-size:13px;">
        Delete Round
      </button>
    </div>
  `;

  // QR code
  const joinUrl = new URL(window.location.href);
  joinUrl.searchParams.set('room', state.roomCode);
  const qrDiv = document.getElementById('qr-code');
  if (qrDiv && typeof QRCode !== 'undefined') {
    new QRCode(qrDiv, { text: joinUrl.toString(), width: 120, height: 120, colorDark: '#0d2b1a', colorLight: '#e8f0eb' });
  }

  document.getElementById('copy-link-btn').onclick = () => {
    navigator.clipboard.writeText(joinUrl.toString()).then(()=>toast('Link copied!')).catch(()=>toast('Copy failed','error'));
  };

  if (isOwner) {
    document.getElementById('start-round-btn').onclick = startRound;
    const toggleBtn = document.getElementById('toggle-holes-btn');
    if (toggleBtn) toggleBtn.onclick = () => { state.editingHoles = !state.editingHoles; render(); };

    document.getElementById('add-player-btn').onclick = async () => {
      const nameEl = document.getElementById('add-player-name');
      const hcpEl = document.getElementById('add-player-hcp');
      const teeEl = document.getElementById('add-player-tee');
      const name = nameEl.value.trim();
      const hcp = parseFloat(hcpEl.value) || 0;
      const tee = teeEl?.value || 'yellow';
      if (!name) { toast('Enter a player name', 'error'); return; }
      if (players.find(p => p.name.toLowerCase() === name.toLowerCase())) {
        toast('Player already in round', 'error'); return;
      }
      const playerId = 'p_' + Date.now();
      await update(ref(db, `${roomPath(state.roomCode)}/players`), {
        [playerId]: { name, handicap: hcp, tee, id: playerId, joinedAt: Date.now() }
      });
      nameEl.value = '';
      hcpEl.value = '';
      toast(`${name} added!`);
    };
  }

  document.getElementById('back-btn').onclick = () => goBackFromRound();
  document.getElementById('delete-round-btn').onclick = () => deleteRound(state.roomCode, state.groupCode);

  if (state.editingHoles) bindHoleEditorEvents(holes);

  window._updateHcp = async (playerId, val) => {
    const n = parseFloat(val);
    if (isNaN(n) || n < 0 || n > 54) return;
    await update(ref(db, `${roomPath(state.roomCode)}/players/${playerId}`), { handicap: n });
  };
  window._updateTee = async (playerId, tee) => {
    await update(ref(db, `${roomPath(state.roomCode)}/players/${playerId}`), { tee });
  };

  // Group member quick-add pills
  groupMembers.forEach(m => {
    const pill = document.getElementById(`gpill-${m.id}`);
    if (!pill) return;
    pill.onclick = async () => {
      pill.disabled = true; pill.textContent = `${m.name} ✓`;
      const pid = 'p_' + Date.now();
      await update(ref(db, `${roomPath(state.roomCode)}/players`), {
        [pid]: { name: m.name, handicap: m.handicap || 0, tee: m.tee || 'yellow', id: pid, joinedAt: Date.now() }
      });
      toast(`${m.name} added!`);
    };
  });
}

function renderHoleEditor(holes) {
  const front = holes.slice(0,9), back = holes.slice(9);
  const renderGroup = (group, offset) => group.map((h,i) => `
    <div class="hole-edit-row">
      <span class="hole-edit-num">${h.hole}</span>
      <span style="font-size:10px;color:var(--muted);">Par</span>
      <select id="par-${offset+i}" style="width:52px;padding:3px 4px;font-size:12px;">
        ${[3,4,5].map(p=>`<option value="${p}" ${h.par===p?'selected':''}>${p}</option>`).join('')}
      </select>
      <span style="font-size:10px;color:var(--muted);">SI</span>
      <input type="number" id="si-${offset+i}" value="${h.si}" min="1" max="18"
        style="width:42px;padding:3px 4px;font-size:12px;text-align:center;">
    </div>
  `).join('');
  return `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
      <div><div style="font-size:10px;color:var(--muted);margin-bottom:6px;letter-spacing:0.08em;">FRONT 9</div>${renderGroup(front,0)}</div>
      <div><div style="font-size:10px;color:var(--muted);margin-bottom:6px;letter-spacing:0.08em;">BACK 9</div>${renderGroup(back,9)}</div>
    </div>
  `;
}

function bindHoleEditorEvents(holes) {
  holes.forEach((h, i) => {
    const parEl = document.getElementById(`par-${i}`);
    const siEl = document.getElementById(`si-${i}`);
    if (parEl) parEl.onchange = () => updateHole(i, 'par', parseInt(parEl.value));
    if (siEl) siEl.onchange = () => updateHole(i, 'si', parseInt(siEl.value));
  });
}

async function updateHole(idx, field, val) {
  const holes = [...(state.round.holes || DEFAULT_HOLES)];
  holes[idx] = { ...holes[idx], [field]: val };
  await update(ref(db, roomPath(state.roomCode)), { holes });
}

async function startRound() {
  await update(ref(db, roomPath(state.roomCode)), { status: 'scoring' });
  updateGroupRoundStatus(state.roomCode, 'scoring');
  state.view = 'scoring';
  state.currentHole = 1;
  render();
}

// ── Scoring view ──
function renderScoring(root) {
  const round = state.round;
  const players = Object.values(round.players || {});
  const holes = round.holes || DEFAULT_HOLES;
  const scores = round.scores || {};
  const hole = holes[state.currentHole - 1];
  const totalPar = holes.reduce((a,h)=>a+h.par,0);

  // Dot status
  const dotClass = (h) => {
    const all = players.every(p => (scores[p.id]||{})[h.hole] != null);
    const some = players.some(p => (scores[p.id]||{})[h.hole] != null);
    if (h.hole === state.currentHole) return 'hole-dot current';
    if (all) return 'hole-dot complete';
    if (some) return 'hole-dot partial';
    return 'hole-dot';
  };

  // Totals
  const totals = players.map(p => {
    let gross=0, net=0, hcpScore=0, played=0;
    holes.forEach(h => {
      const s = (scores[p.id]||{})[h.hole];
      if (s != null) { gross+=s; net+=(s - h.par - calcExtraStroke(p.handicap, h.si)); hcpScore+=calcHandicapScore(s, h.par, p.handicap, h.si); played++; }
    });
    return { ...p, gross, net, hcpScore, played };
  }).sort((a,b)=>a.net-b.net);

  root.innerHTML = `
    <div class="fade-in">
      <div class="nav">
        <button class="nav-btn" id="nav-back">← ${state.groupCode ? 'Group' : 'Home'}</button>
        <button class="nav-btn active">Scoring</button>
        <button class="nav-btn" id="nav-lb">Leaderboard</button>
      </div>

      <div class="hole-nav">
        <button class="hole-arrow" id="prev-hole" ${state.currentHole===1?'disabled':''}>←</button>
        <div class="hole-title">
          <div class="hole-num">Hole ${state.currentHole}</div>
          <div class="hole-meta">Par ${hole.par} &nbsp;·&nbsp; SI ${hole.si}</div>
        </div>
        <button class="hole-arrow" id="next-hole" ${state.currentHole===18?'disabled':''}>→</button>
      </div>

      <div class="hole-dots">
        ${holes.map(h => `<button class="hole-dot ${dotClass(h).replace('hole-dot ','').replace('hole-dot','').trim()}" 
          id="dot-${h.hole}" onclick="window._goHole(${h.hole})">${h.hole}</button>`).join('')}
      </div>

      <div id="score-entries">
        ${players.map(p => renderScoreEntry(p, hole, scores)).join('')}
      </div>

      <div class="card mt-14">
        <div class="section-label">Running Totals</div>
        ${totals.map(p => `
          <div class="totals-row">
            <span>${p.name} ${p.name===state.playerName?'<span style="font-size:10px;color:var(--green-accent);">(you)</span>':''}</span>
            <span style="color:var(--muted);">
              ${p.played > 0 ? `${p.gross} gross · <span style="color:${p.net<0?'#10b981':p.net===0?'var(--cream)':'#f97316'}">${p.net>=0?'+'+p.net:p.net}</span> net · <span style="color:var(--gold);">${p.hcpScore} hcp</span>` : '—'}
            </span>
          </div>
        `).join('')}
      </div>

      <button class="btn btn-secondary mt-14" id="finish-btn">View Final Leaderboard →</button>
    </div>
  `;

  // Bind holes dots properly
  holes.forEach(h => {
    const dot = document.getElementById(`dot-${h.hole}`);
    if (dot) {
      dot.className = dotClass(h);
      dot.onclick = () => { state.currentHole = h.hole; render(); };
    }
  });

  document.getElementById('prev-hole').onclick = () => { if(state.currentHole>1){state.currentHole--;render();} };
  document.getElementById('next-hole').onclick = () => { if(state.currentHole<18){state.currentHole++;render();} };
  document.getElementById('nav-back').onclick = () => goBackFromRound();
  document.getElementById('nav-lb').onclick = () => { state.view='leaderboard'; render(); };
  document.getElementById('finish-btn').onclick = async () => {
    await update(ref(db, roomPath(state.roomCode)), { status: 'complete' });
    updateGroupRoundStatus(state.roomCode, 'complete');
    state.view = 'leaderboard'; render();
  };

  window._goHole = (n) => { state.currentHole=n; render(); };
  bindScoreEntries(players, hole, scores);
}

function calcExtraStroke(handicap, si) {
  const h = Math.round(handicap);
  return Math.floor(h / 18) + (h % 18 >= si ? 1 : 0);
}

function calcHandicapScore(gross, par, handicap, si) {
  const max = par + 2 + calcExtraStroke(handicap, si);
  return Math.min(gross, max);
}

function scoreLabel(diff) {
  if (diff <= -3) return { label:'Albatross', color:'var(--gold)' };
  if (diff === -2) return { label:'Eagle', color:'var(--eagle)' };
  if (diff === -1) return { label:'Birdie', color:'var(--birdie)' };
  if (diff === 0)  return { label:'Par', color:'var(--muted)' };
  if (diff === 1)  return { label:'Bogey', color:'var(--bogey)' };
  if (diff === 2)  return { label:'Double', color:'var(--double)' };
  return { label:`+${diff}`, color:'var(--double)' };
}

function renderScoreEntry(player, hole, scores) {
  const s = (scores[player.id]||{})[hole.hole];
  const extraStroke = calcExtraStroke(player.handicap, hole.si);
  const diff = s != null ? (s - hole.par) : null;
  const lbl = diff != null ? scoreLabel(diff) : null;
  const tee = player.tee || 'yellow';
  const teeData = TEE_INFO[tee];
  const rawYards = hole.yards;
  const yards = rawYards && typeof rawYards === 'object' ? rawYards[tee] : rawYards;
  return `
    <div class="score-card ${s!=null?'has-score':''}" id="sc-${player.id}">
      <div class="score-info">
        <div class="score-player-name">${player.name}${extraStroke?` <span style="color:var(--gold);font-size:11px;">●</span>`:''}
          ${player.name===state.playerName?'<span style="font-size:10px;color:var(--green-accent);margin-left:4px;">(you)</span>':''}
        </div>
        <div class="score-hcp-note">
          HCP <input type="number" class="hcp-inline" id="hcp-inline-${player.id}"
            value="${player.handicap}" min="0" max="54" step="0.1">
          ${teeData ? ` &nbsp;·&nbsp; <span style="color:${teeData.color};">■</span> ${teeData.label}` : ''}
          ${yards ? ` · ${yards}y` : ''}
          ${extraStroke ? ' · extra stroke' : ''}
        </div>
      </div>
      <div class="score-controls">
        ${lbl ? `<span class="score-badge" style="color:${lbl.color};background:${lbl.color}22;">${lbl.label}</span>` : ''}
        <button class="adj-btn" id="dec-${player.id}" ${(s!=null&&s<=1)?'disabled':''}>−</button>
        <input type="number" class="score-input" id="inp-${player.id}"
          value="${s??''}" placeholder="${hole.par}" min="1" max="15">
        <button class="adj-btn" id="inc-${player.id}">+</button>
      </div>
    </div>
  `;
}

function bindScoreEntries(players, hole, scores) {
  players.forEach(player => {
    const s = (scores[player.id]||{})[hole.hole];
    const inp = document.getElementById(`inp-${player.id}`);
    const dec = document.getElementById(`dec-${player.id}`);
    const inc = document.getElementById(`inc-${player.id}`);
    if (!inp) return;

    const setScore = async (val) => {
      const n = parseInt(val);
      if (!val || isNaN(n) || n<1 || n>15) return;
      await update(ref(db, `${roomPath(state.roomCode)}/scores/${player.id}`), { [hole.hole]: n });
    };

    inp.oninput = (e) => setScore(e.target.value);
    if (dec) dec.onclick = () => { const cur = parseInt(inp.value); setScore(isNaN(cur) ? hole.par - 1 : cur - 1); };
    if (inc) inc.onclick = () => { const cur = parseInt(inp.value); setScore(isNaN(cur) ? hole.par : cur + 1); };

    const hcpInp = document.getElementById(`hcp-inline-${player.id}`);
    if (hcpInp) {
      hcpInp.onchange = async (e) => {
        const n = parseFloat(e.target.value);
        if (isNaN(n) || n < 0 || n > 54) return;
        await update(ref(db, `${roomPath(state.roomCode)}/players/${player.id}`), { handicap: n });
      };
    }
  });
}

// ── Leaderboard ──
function renderLeaderboard(root) {
  const round = state.round;
  const players = Object.values(round.players || {});

  const lb = players.map(p => {
    let gross=0, net=0, hcpScore=0, played=0, frontGross=0, backGross=0, stableford=0, frontSF=0, backSF=0;
    holes.forEach((h,i) => {
      const s = (scores[p.id]||{})[h.hole];
      if (s != null) {
        played++;
        gross+=s;
        net+=(s - h.par - calcExtraStroke(p.handicap, h.si));
        hcpScore+=calcHandicapScore(s, h.par, p.handicap, h.si);
        const pts = Math.max(0, 2 - (s - h.par - calcExtraStroke(p.handicap, h.si)));

      const n = parseFloat(e.target.value);
      if (isNaN(n) || n < 0 || n > 54) return;
      await update(ref(db, `${roomPath(state.roomCode)}/players/${p.id}`), { handicap: n });
    };
  });

  const navScoring = document.getElementById('nav-scoring');
  if (navScoring) navScoring.onclick = () => { state.view='scoring'; render(); };
  document.getElementById('nav-back').onclick = () => goBackFromRound();
  document.getElementById('delete-round-btn').onclick = () => deleteRound(state.roomCode, state.groupCode);
  document.getElementById('new-round-btn').onclick = () => {
    if (unsubscribe) unsubscribe();
    const url = new URL(window.location);
    url.searchParams.delete('room');
    window.history.replaceState({}, '', url);
    if (state.groupCode) {
      state.roomCode = null; state.playerName = null; state.round = null;
      state.currentHole = 1; state.editingHoles = false;
      state.view = 'group-home';
    } else {
      state = { view:'join', roomCode:null, playerName:null, round:null, currentHole:1, editingHoles:false, groupCode:null, group:null, groupPlayerName:null };
    }
    render();
  };
}

// ── Group Home ──
function renderGroupHome(root) {
  const group = state.group;
  const members = Object.values(group.members || {}).sort((a,b) => a.joinedAt - b.joinedAt);
  const groupRounds = Object.entries(group.rounds || {})
    .map(([code, r]) => ({ code, ...r }))
    .sort((a,b) => (b.date||'').localeCompare(a.date||'') || b.createdAt - a.createdAt);

  const joinUrl = new URL(window.location.href);
  joinUrl.searchParams.delete('room');
  joinUrl.searchParams.set('group', state.groupCode);

  root.innerHTML = `
    <div class="fade-in">
      <div class="card" style="margin-bottom:16px;">
        <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;">
          <div style="flex:1;min-width:0;">
            <div style="display:flex;align-items:center;gap:8px;">
              <div id="group-name-display" style="font-family:'Playfair Display',serif;font-size:20px;color:#b8ddc4;">${group.name}</div>
              <button class="btn-sm" id="edit-group-name-btn" style="flex-shrink:0;">✎</button>
            </div>
            <div style="font-size:11px;color:var(--muted);margin-top:3px;">
              Code: <strong style="color:var(--green-accent);letter-spacing:0.1em;">${state.groupCode}</strong>
            </div>
          </div>
          <button class="btn-sm" id="copy-group-btn" style="flex-shrink:0;">📋 Share</button>
        </div>
      </div>

      <div class="card" style="margin-bottom:16px;">
        <div class="section-label">Members</div>
        ${members.map(m => `
          <div class="player-row" id="mrow-${m.id}">
            <div class="player-name" style="flex:1;min-width:0;">
              <div id="mname-${m.id}" style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">
                <span>${m.name}${m.name === state.groupPlayerName ? ' <span style="font-size:11px;color:var(--green-accent);">(you)</span>' : ''}</span>
                <button class="btn-sm edit-name-btn" data-id="${m.id}" data-name="${m.name}"
                  style="padding:2px 7px;font-size:10px;">✎</button>
              </div>
              <div id="confirm-remove-${m.id}"></div>
            </div>
            <div style="display:flex;align-items:center;gap:6px;flex-shrink:0;">
              <span class="player-hcp">HCP</span>
              <input type="number" class="hcp-inline" id="ghcp-${m.id}"
                value="${m.handicap ?? 0}" min="0" max="54" step="0.1"
                style="width:52px;padding:4px 6px;font-size:13px;">
              <button class="remove-btn remove-member-btn" data-id="${m.id}" data-name="${m.name}"
                title="Remove member">✕</button>
            </div>
          </div>
        `).join('')}
        <div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border);">
          <div class="section-label" style="margin-bottom:8px;">Add Member</div>
          <div style="display:flex;gap:8px;flex-wrap:wrap;">
            <input type="text" id="add-member-name" placeholder="Name" style="flex:1;min-width:100px;">
            <input type="number" id="add-member-hcp" placeholder="HCP" min="0" max="54" step="0.1" style="width:66px;">
            <button class="btn-sm" id="add-member-btn" style="padding:5px 14px;">+ Add</button>
          </div>
        </div>
      </div>

      <button class="btn btn-primary" id="new-group-round-btn" style="margin-bottom:20px;">+ New Round</button>

      <div class="section-label" style="margin-bottom:10px;">Rounds</div>
      ${groupRounds.length === 0 ? `
        <div style="text-align:center;padding:32px 16px;color:var(--muted);font-size:13px;">
          No rounds yet — start the first one!
        </div>
      ` : groupRounds.map(r => `
        <div class="round-row" id="rr-${r.code}">
          <div class="round-row-left">
            <div class="round-row-day">${r.date ? new Date(r.date+'T12:00:00').getDate() : '?'}</div>
            <div class="round-row-mon">${r.date ? new Date(r.date+'T12:00:00').toLocaleDateString('en-GB',{month:'short'}) : ''}</div>
          </div>
          <div class="round-row-info">
            <div class="round-row-course">${r.courseName || 'Unknown course'}</div>
            <div class="round-row-players">${r.playerNames || ''}</div>
          </div>
          <span class="status-pip ${r.status||'setup'}">
            ${r.status==='complete'?'Complete':r.status==='scoring'?'Live':'Pending'}
          </span>
          <button class="del-round-btn" data-code="${r.code}"
            style="background:none;border:none;color:rgba(255,100,100,0.4);font-size:18px;cursor:pointer;padding:4px;flex-shrink:0;line-height:1;"
            title="Delete round">🗑</button>
        </div>
      `).join('')}

      <button class="btn btn-secondary mt-20" id="leave-group-btn">← Back to Home</button>
    </div>
  `;

  document.getElementById('copy-group-btn').onclick = () => {
    navigator.clipboard.writeText(joinUrl.toString()).then(()=>toast('Group link copied!')).catch(()=>toast('Copy failed','error'));
  };

  members.forEach(m => {
    const inp = document.getElementById(`ghcp-${m.id}`);
    if (inp) inp.onchange = async (e) => {
      const n = parseFloat(e.target.value);
      if (isNaN(n) || n < 0 || n > 54) return;
      await update(ref(db, `${groupPath(state.groupCode)}/members/${m.id}`), { handicap: n });
    };
  });

  // Edit group name
  document.getElementById('edit-group-name-btn').onclick = () => {
    const display = document.getElementById('group-name-display');
    const editBtn = document.getElementById('edit-group-name-btn');
    const currentName = group.name;
    display.innerHTML = `
      <input type="text" id="group-name-input" value="${currentName}"
        style="font-size:16px;padding:3px 8px;max-width:160px;">
      <button class="btn-sm" id="save-group-name-btn" style="padding:3px 10px;">Save</button>
      <button class="btn-sm" id="cancel-group-name-btn" style="padding:3px 10px;opacity:0.6;">✕</button>
    `;
    editBtn.style.display = 'none';
    document.getElementById('save-group-name-btn').onclick = async () => {
      const val = document.getElementById('group-name-input').value.trim();
      if (!val) { toast('Name cannot be empty', 'error'); return; }
      await update(ref(db, groupPath(state.groupCode)), { name: val });
      saveGroupSession(state.groupCode, state.groupPlayerName, val);
    };
    document.getElementById('cancel-group-name-btn').onclick = () => {
      display.textContent = currentName;
      editBtn.style.display = '';
    };
  };

  // Edit member names
  root.querySelectorAll('.edit-name-btn').forEach(btn => {
    btn.onclick = () => {
      const id = btn.dataset.id;
      const currentName = btn.dataset.name;
      const nameDiv = document.getElementById(`mname-${id}`);
      nameDiv.innerHTML = `
        <input type="text" id="mname-input-${id}" value="${currentName}"
          style="font-size:13px;padding:3px 8px;max-width:130px;">
        <button class="btn-sm" id="save-mname-${id}" style="padding:3px 10px;">Save</button>
        <button class="btn-sm" id="cancel-mname-${id}" style="padding:3px 10px;opacity:0.6;">✕</button>
      `;
      document.getElementById(`save-mname-${id}`).onclick = async () => {
        const val = document.getElementById(`mname-input-${id}`).value.trim();
        if (!val) { toast('Name cannot be empty', 'error'); return; }
        await update(ref(db, `${groupPath(state.groupCode)}/members/${id}`), { name: val });
        if (currentName === state.groupPlayerName) {
          state.groupPlayerName = val;
          saveGroupSession(state.groupCode, val, state.group.name);
        }
      };
      document.getElementById(`cancel-mname-${id}`).onclick = () => {
        nameDiv.innerHTML = `
          <span>${currentName}${currentName === state.groupPlayerName ? ' <span style="font-size:11px;color:var(--green-accent);">(you)</span>' : ''}</span>
          <button class="btn-sm edit-name-btn" data-id="${id}" data-name="${currentName}"
            style="padding:2px 7px;font-size:10px;">✎</button>
        `;
        // Re-bind the edit button
        nameDiv.querySelector('.edit-name-btn').onclick = btn.onclick;
      };
    };
  });

  // Remove members (two-step confirmation)
  root.querySelectorAll('.remove-member-btn').forEach(btn => {
    btn.onclick = () => {
      const id = btn.dataset.id;
      const name = btn.dataset.name;
      const confirmDiv = document.getElementById(`confirm-remove-${id}`);
      if (confirmDiv.innerHTML) {
        // Already showing confirmation — dismiss it
        confirmDiv.innerHTML = '';
        btn.style.opacity = '';
        return;
      }
      btn.style.opacity = '0.3';
      confirmDiv.innerHTML = `
        <div style="margin-top:4px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;">
          <span style="font-size:11px;color:var(--muted);">Remove ${name}?</span>
          <button class="btn-sm" id="confirm-rm-${id}"
            style="padding:2px 10px;font-size:11px;background:rgba(255,80,80,0.15);color:#f87171;border-color:#f87171;">
            Confirm
          </button>
          <button class="btn-sm" id="cancel-rm-${id}" style="padding:2px 10px;font-size:11px;">Cancel</button>
        </div>
      `;
      document.getElementById(`confirm-rm-${id}`).onclick = async () => {
        await set(ref(db, `${groupPath(state.groupCode)}/members/${id}`), null);
        toast(`${name} removed from group`);
      };
      document.getElementById(`cancel-rm-${id}`).onclick = () => {
        confirmDiv.innerHTML = '';
        btn.style.opacity = '';
      };
    };
  });

  document.getElementById('add-member-btn').onclick = async () => {
    const nameEl = document.getElementById('add-member-name');
    const hcpEl = document.getElementById('add-member-hcp');
    const name = nameEl.value.trim();
    const hcp = parseFloat(hcpEl.value) || 0;
    if (!name) { toast('Enter a name', 'error'); return; }
    if (members.find(m => m.name.toLowerCase() === name.toLowerCase())) {
      toast('Already in group', 'error'); return;
    }
    const memberId = 'p_' + Date.now();
    await update(ref(db, `${groupPath(state.groupCode)}/members`), {
      [memberId]: { name, handicap: hcp, tee: 'yellow', id: memberId, joinedAt: Date.now() }
    });
    nameEl.value = ''; hcpEl.value = '';
    toast(`${name} added to group!`);
  };

  document.getElementById('new-group-round-btn').onclick = () => { state.view = 'new-group-round'; render(); };
  document.getElementById('leave-group-btn').onclick = () => {
    if (groupUnsubscribe) groupUnsubscribe();
    state.groupCode = null; state.group = null; state.groupPlayerName = null;
    state.view = 'join';
    const url = new URL(window.location); url.searchParams.delete('group'); window.history.replaceState({},'' ,url);
    render();
  };
  groupRounds.forEach(r => {
    const el = document.getElementById(`rr-${r.code}`);
    if (el) el.onclick = (e) => {
      if (e.target.closest('.del-round-btn')) return; // handled separately
      joinRound(r.code, state.groupPlayerName);
    };
  });
  root.querySelectorAll('.del-round-btn').forEach(btn => {
    btn.onclick = (e) => { e.stopPropagation(); deleteRound(btn.dataset.code, state.groupCode); };
  });
}

// ── New Group Round ──
function renderNewGroupRound(root) {
  const group = state.group;
  const members = Object.values(group.members || {}).sort((a,b) => a.joinedAt - b.joinedAt);
  const selected = new Set(members.filter(m => m.name === state.groupPlayerName).map(m => m.id));
  // HCP overrides (editable before creating)
  const hcpOverrides = {};
  members.forEach(m => { hcpOverrides[m.id] = m.handicap || 0; });

  function getSelected() { return members.filter(m => selected.has(m.id)); }

  function renderPills() {
    const container = document.getElementById('player-pills');
    if (!container) return;
    container.innerHTML = members.map(m => `
      <button class="player-pill ${selected.has(m.id)?'selected':''} ${m.name===state.groupPlayerName?'locked':''}"
        id="pill-${m.id}">
        ${m.name}${m.name===state.groupPlayerName?' (you)':''}
      </button>
    `).join('');
    members.forEach(m => {
      const pill = document.getElementById(`pill-${m.id}`);
      if (pill && m.name !== state.groupPlayerName) {
        pill.onclick = () => {
          if (selected.has(m.id)) selected.delete(m.id); else selected.add(m.id);
          renderPills();
          renderHcpInputs();
        };
      }
    });
  }

  function renderHcpInputs() {
    const container = document.getElementById('hcp-inputs');
    if (!container) return;
    const sel = getSelected();
    container.innerHTML = sel.length === 0 ? '' : `
      <div style="margin-top:14px;padding-top:14px;border-top:1px solid var(--border);">
        <div class="section-label" style="margin-bottom:8px;">Handicaps &amp; Tees</div>
        ${sel.map(m => {
          const courseTees = (document.getElementById('course-select')?.value &&
            COURSES[document.getElementById('course-select').value]?.tees) || [];
          return `
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">
            <span style="flex:1;font-size:13px;">${m.name}</span>
            ${courseTees.length > 0 ? `
              <select id="tee-new-${m.id}" style="width:80px;padding:4px 6px;font-size:12px;">
                ${courseTees.map(t=>`<option value="${t}" ${(m.tee||'yellow')===t?'selected':''}>${TEE_INFO[t]?.label||t}</option>`).join('')}
              </select>
            ` : ''}
            <input type="number" id="hcp-new-${m.id}" value="${hcpOverrides[m.id]??m.handicap??0}"
              min="0" max="54" step="0.1" style="width:64px;padding:4px 6px;font-size:13px;">
          </div>`;
        }).join('')}
      </div>
    `;
  }

  root.innerHTML = `
    <div class="fade-in">
      <div class="card">
        <div class="section-label">New Round</div>
        <div style="margin-bottom:10px;">
          <div style="font-size:10px;color:var(--muted);letter-spacing:0.1em;margin-bottom:5px;">DATE</div>
          <input type="date" id="round-date" value="${todayDate()}">
        </div>
        <div style="margin-bottom:10px;">
          <div style="font-size:10px;color:var(--muted);letter-spacing:0.1em;margin-bottom:5px;">COURSE</div>
          <select id="course-select">
            <option value="">-- Select a course --</option>
            ${Object.entries(COURSES).map(([k,c])=>`<option value="${k}">${c.name}, ${c.location}</option>`).join('')}
            <option value="other">Other / Custom</option>
          </select>
          <input type="text" id="new-course" placeholder="Course name" style="margin-top:8px;display:none;">
        </div>
        <div>
          <div style="font-size:10px;color:var(--muted);letter-spacing:0.1em;margin-bottom:8px;">WHO'S PLAYING?</div>
          <div id="player-pills" style="display:flex;flex-wrap:wrap;"></div>
        </div>
        <div id="hcp-inputs"></div>
      </div>

      <button class="btn btn-primary" id="create-group-round-btn">Create Round →</button>
      <button class="btn btn-secondary mt-8" id="back-btn">← Back to Group</button>
    </div>
  `;

  renderPills();
  renderHcpInputs();

  document.getElementById('course-select').onchange = (e) => {
    document.getElementById('new-course').style.display = e.target.value === 'other' ? 'block' : 'none';
    renderHcpInputs();
  };

  document.getElementById('back-btn').onclick = () => { state.view = 'group-home'; render(); };

  document.getElementById('create-group-round-btn').onclick = async () => {
    const courseKey = document.getElementById('course-select').value;
    const date = document.getElementById('round-date').value || todayDate();
    if (!courseKey) { toast('Select a course', 'error'); return; }
    if (selected.size === 0) { toast('Select at least one player', 'error'); return; }
    let courseName, holes;
    if (courseKey === 'other') {
      courseName = document.getElementById('new-course').value.trim() || 'Custom Course';
      holes = DEFAULT_HOLES;
    } else {
      const c = COURSES[courseKey];
      courseName = `${c.name}, ${c.location}`;
      holes = c.holes;
    }
    // Collect final handicap/tee values from inputs
    const selectedMembers = getSelected().map(m => ({
      ...m,
      handicap: parseFloat(document.getElementById(`hcp-new-${m.id}`)?.value) ?? m.handicap ?? 0,
      tee: document.getElementById(`tee-new-${m.id}`)?.value || m.tee || 'yellow',
    }));
    await createGroupRound(courseName, holes, courseKey === 'other' ? null : courseKey, date, selectedMembers);
  };
}

// ── Boot ──
const firebaseReady = tryInitFirebase();
// Pre-fill group code from URL if present
const _bootParams = new URLSearchParams(window.location.search);
const _bootGroup = _bootParams.get('group');
if (_bootGroup) {
  // Will be picked up in renderJoin's join-group-code field; just navigate there
  setTimeout(() => {
    const el = document.getElementById('join-group-code');
    if (el) { el.value = _bootGroup.toUpperCase(); el.focus(); }
  }, 50);
}
render();
</script>
</body>
</html>
